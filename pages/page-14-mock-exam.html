<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전 모의 20문항 | 반도체 디지털 회로설계 가이드북</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/guidebook-common.css">
</head>
<body class="page-standalone" data-page-id="page-14">
    <main class="page-shell">
        <section class="page-section active" id="page-14">
                        <div class="bg-white border border-gray-200 rounded-[32px] p-8 lg:p-12 shadow-sm relative overflow-hidden">
                            <!-- Decorative Element -->
                            <div class="absolute top-0 right-0 w-64 h-64 bg-blue-50 opacity-50 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

                            <div class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-100 pb-8 relative z-10">
                                <div>
                                    <div class="mb-3"><span class="badge">Part 13</span></div>
                                    <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">실전 모의 20문항</h2>
                                    <p class="text-gray-500 text-sm mt-2 font-medium">실제 시험 감각에 맞춘 20문항 / 30분 기준 연습 세트입니다. 제출 전까지는 정답이 공개되지 않습니다.</p>
                                </div>
                                <div class="mt-6 md:mt-0 text-center bg-gray-50 px-8 py-4 rounded-2xl border border-gray-200">
                                    <span class="text-xs text-gray-500 block mb-1 uppercase tracking-widest font-bold">Time Left</span>
                                    <span id="timer-display" class="text-4xl font-mono font-bold tracking-wider text-blue-600">30:00</span>
                                </div>
                            </div>

                            <div id="mock-start-screen" class="text-center py-20 relative z-10" data-guidebook-toc-title="시험 안내">
                                <p class="mb-10 text-gray-600 text-lg leading-relaxed max-w-xl mx-auto">준비가 완료되면 아래 버튼을 눌러 실전 모의고사를 시작하세요. <br><span class="text-sm opacity-80">(시작 시 문제은행에서 랜덤 20문제가 출력됩니다.)</span></p>
                                <button onclick="startMockExam()" class="bg-blue-600 text-white hover:bg-blue-700 font-extrabold text-lg py-5 px-16 rounded-2xl shadow-[0_8px_20px_rgba(49,130,246,0.3)] transition-all">시험 시작하기</button>
                            </div>

                            <div id="mock-exam-container" class="hidden space-y-8 mt-6 relative z-10" data-guidebook-toc-title="문항 풀이">
                                <!-- Real Exam Questions Injected by JS -->
                            </div>

                            <div id="mock-submit-btn" class="hidden text-center mt-12 relative z-10">
                                <button onclick="submitMockExam()" class="bg-gray-900 hover:bg-black text-white font-extrabold text-lg py-5 px-16 rounded-2xl shadow-lg transition-all">답안 최종 제출 및 채점</button>
                            </div>

                            <div id="mock-result-screen" class="hidden text-center py-20 bg-gray-50 rounded-3xl mt-10 relative z-10 border border-gray-100" data-guidebook-toc-title="채점 결과">
                                <h3 class="text-3xl font-extrabold text-gray-900 mb-2">시험 종료</h3>
                                <p class="text-lg text-gray-500 mb-8 font-medium">수고하셨습니다. 당신의 점수는...</p>
                                <div id="score-display" class="text-7xl font-black text-blue-600 mb-10"></div>
                                <button onclick="location.reload()" class="bg-white hover:bg-gray-50 text-gray-800 font-bold py-4 px-10 rounded-2xl border border-gray-200 transition-colors shadow-sm">초기화 후 재응시</button>
                            </div>
                        </div>
                    </section>
    </main>
    <script src="../assets/guidebook-page-common.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            window.GuidebookPage.initStandalonePage();
        });
    </script>
</body>
</html>
