  <script>
    (function () {
      const frameObservers = new WeakMap();
      const frameMutationObservers = new WeakMap();
      const resizeTimers = new WeakMap();
      const frameHeightHints = {
        'sequence-diagram': 2200,
        'uvm-definition': 3200,
        'uvm-basic': 7200,
        'uvm-library': 9800,
        'sequence-item': 6000,
        'sequence': 5600,
        'driver': 5700,
        'sequencer': 2900,
        'scoreboard': 4700,
        'coverage': 6100,
        'agent': 6700,
        'env': 7200,
        'sva': 8000,
        'test': 7100,
        'vcs-verdi': 7200,
      };

      const notifyParentHeight = () => {
        if (window.GuidebookPage && typeof window.GuidebookPage.notifyHeight === 'function') {
          window.GuidebookPage.notifyHeight();
        }
      };

      const applySectionFrameLayout = (frame) => {
        if (!frame) return;
        frame.setAttribute('scrolling', 'no');
        frame.style.overflow = 'hidden';

        const doc = frame.contentDocument;
        if (!doc) return;

        let style = doc.getElementById('chipbook-page7-no-vertical-scroll');
        if (!style) {
          style = doc.createElement('style');
          style.id = 'chipbook-page7-no-vertical-scroll';
          doc.head?.appendChild(style);
        }

        style.textContent = `
          html,
          body {
            height: auto !important;
            min-height: 0 !important;
            overflow-y: hidden !important;
          }

          #root,
          #root > div {
            height: auto !important;
            min-height: 0 !important;
          }

          #root main.flex-1 {
            flex: none !important;
            overflow: visible !important;
          }

          .scroll-container {
            height: auto !important;
            max-height: none !important;
            overflow-y: hidden !important;
          }

          .overflow-y-auto,
          .overflow-y-scroll,
          .overflow-auto {
            max-height: none !important;
            overflow-y: visible !important;
          }
        `;
      };

      const measureDocumentHeight = (doc) => {
        if (!doc) return 720;

        const body = doc.body;
        const html = doc.documentElement;
        if (!body || doc.location.href === 'about:blank' || !body.children.length) {
          return 0;
        }

        const win = doc.defaultView || window;
        const descendants = body ? Array.from(body.querySelectorAll('*')) : [];
        const maxBottom = descendants.reduce((max, element) => {
          const rect = element.getBoundingClientRect();
          return Math.max(max, Math.ceil(rect.bottom + win.scrollY));
        }, 0);
        const isPreviewFitSection = body?.dataset?.page7HeightMode === 'preview-fit';
        const maxScrollable = isPreviewFitSection ? 0 : descendants.reduce((max, element) => {
          return Math.max(max, Number(element.scrollHeight) || 0);
        }, 0);

        if (isPreviewFitSection) {
          return Math.max(
            body ? body.scrollHeight : 0,
            body ? body.offsetHeight : 0,
            maxBottom,
            720
          );
        }

        return Math.max(
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0,
          html ? html.scrollHeight : 0,
          html ? html.offsetHeight : 0,
          maxBottom,
          maxScrollable,
          720
        );
      };

      const measureFrame = (frame) => {
        if (!frame || !frame.contentDocument) return;
        applySectionFrameLayout(frame);
        const height = measureDocumentHeight(frame.contentDocument);
        if (!height) return;
        frame.style.height = `${Math.ceil(height)}px`;
        const shell = frame.closest('.page7-source-shell');
        shell?.classList.add('is-ready');
        notifyParentHeight();
      };

      const applyFrameHeightHint = (key, frame) => {
        const hintedHeight = frameHeightHints[key] || 1600;
        const currentHeight = Number.parseFloat(frame.style.height) || frame.clientHeight || 0;
        if (currentHeight < hintedHeight) {
          frame.style.height = `${hintedHeight}px`;
          notifyParentHeight();
        }
      };

      const scheduleMeasure = (frame, delay = 0) => {
        window.setTimeout(() => {
          try {
            measureFrame(frame);
          } catch (error) {
            frame.style.height = '1280px';
            const shell = frame.closest('.page7-source-shell');
            shell?.classList.add('is-ready');
            notifyParentHeight();
          }
        }, delay);
      };

      const debounceMeasure = (frame, delay = 40) => {
        const previous = resizeTimers.get(frame);
        if (previous) window.clearTimeout(previous);
        const timer = window.setTimeout(() => {
          resizeTimers.delete(frame);
          try {
            measureFrame(frame);
          } catch (error) {
            frame.style.height = '1280px';
            const shell = frame.closest('.page7-source-shell');
            shell?.classList.add('is-ready');
            notifyParentHeight();
          }
        }, delay);
        resizeTimers.set(frame, timer);
      };

      const scheduleFrameMeasureSeries = (frame) => {
        [0, 160, 720, 1600, 3200, 6000].forEach((delay) => scheduleMeasure(frame, delay));
      };

      const bindFrameContentObservers = (frame) => {
        const doc = frame?.contentDocument;
        if (!doc) return;

        if (typeof ResizeObserver !== 'undefined') {
          frameObservers.get(frame)?.disconnect();
          const observer = new ResizeObserver(() => debounceMeasure(frame, 40));
          if (doc.documentElement) observer.observe(doc.documentElement);
          if (doc.body) observer.observe(doc.body);
          frameObservers.set(frame, observer);
        }

        if (typeof MutationObserver !== 'undefined' && doc.documentElement) {
          frameMutationObservers.get(frame)?.disconnect();
          const mutationObserver = new MutationObserver(() => debounceMeasure(frame, 80));
          mutationObserver.observe(doc.documentElement, {
            attributes: true,
            childList: true,
            characterData: true,
            subtree: true,
          });
          frameMutationObservers.set(frame, mutationObserver);
        }

        if (doc.fonts && typeof doc.fonts.ready?.then === 'function') {
          doc.fonts.ready.then(() => debounceMeasure(frame, 0)).catch(() => {});
        }

        doc.defaultView?.addEventListener('load', () => debounceMeasure(frame, 0), { once: true });
      };

      const bindFrameResize = (frame) => {
        if (!frame || frame.dataset.page7ResizeBound === 'true') return;
        frame.dataset.page7ResizeBound = 'true';
        frame.setAttribute('scrolling', 'no');
        frame.style.overflow = 'hidden';
        frame.addEventListener('load', () => {
          applySectionFrameLayout(frame);
          scheduleFrameMeasureSeries(frame);

          try {
            bindFrameContentObservers(frame);
          } catch (error) {
            // If a section ever becomes cross-origin, the fallback height keeps the page usable.
          }
        });
      };

      const ensureFrameLoaded = (key) => {
        const panel = document.querySelector(`[data-page7-panel="${key}"]`);
        const frame = panel?.querySelector('[data-page7-source-frame]');
        if (!frame) return;
        bindFrameResize(frame);
        applyFrameHeightHint(key, frame);
        if (!frame.src) {
          frame.src = frame.dataset.src;
          return;
        }
        bindFrameContentObservers(frame);
        scheduleFrameMeasureSeries(frame);
      };

      const preloadFrames = () => {
        const frames = Array.from(document.querySelectorAll('[data-page7-source-frame]'));
        let index = 0;
        const loadNext = () => {
          while (index < frames.length && frames[index].src) {
            index += 1;
          }
          if (index >= frames.length) return;
          const frame = frames[index];
          index += 1;
          bindFrameResize(frame);
          const key = frame.closest('[data-page7-panel]')?.getAttribute('data-page7-panel') || '';
          applyFrameHeightHint(key, frame);
          frame.src = frame.dataset.src;
          window.setTimeout(loadNext, 800);
        };
        window.setTimeout(loadNext, 1200);
      };

      const setTabButtonState = ({ button, isActive }) => {
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      };

      window.GuidebookPage.initActionSectionPage({
        defaultKey: 'sequence-diagram',
        panelSelector: '[data-page7-panel]',
        panelKeyDataset: 'page7Panel',
        titleAttribute: 'data-guidebook-toc-title',
        panelStateMode: 'class',
        panelActiveClass: 'active',
        buttonSelector: '[data-page7-tab]',
        buttonKeyDataset: 'page7Tab',
        currentHeader: {
          shellId: 'part7-current-shell',
          labelId: 'part7-current-label',
        },
        beforeInit: () => {
          if (window.parent && window.parent !== window) {
            document.body.classList.add('is-embedded');
          }
        },
        applyButtonState: setTabButtonState,
        onAfterSet: ({ activeKey }) => {
          ensureFrameLoaded(activeKey);
          window.setTimeout(notifyParentHeight, 80);
          window.setTimeout(notifyParentHeight, 600);
        },
        afterInit: (engine) => {
          ensureFrameLoaded(engine.getActiveKey());
          preloadFrames();
        },
      });

      window.addEventListener('resize', () => {
        const activeFrame = document.querySelector('.page7-panel.active [data-page7-source-frame]');
        if (activeFrame) debounceMeasure(activeFrame, 80);
      });
    })();
  </script>
