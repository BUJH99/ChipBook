<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 13 | 예상 기출문제 | 반도체 디지털 회로설계 가이드북</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/guidebook-common.css">
</head>
<body class="page-standalone" data-page-id="page-13">
    <main class="page-shell">
        <section class="page-section active" id="page-13">
                        <div class="mb-4"><span class="badge">Part 13</span></div>
                        <div class="flex flex-col xl:flex-row xl:items-end xl:justify-between gap-5 mb-8">
                            <div>
                                <h2 class="section-title mb-3">예상 기출문제</h2>
                            </div>
                            <div id="practice-bank-status" class="practice-mini-status">180문항 로드 완료</div>
                        </div>

                        <div id="practice-difficulty-overview" class="rounded-[30px] border border-blue-100 bg-[linear-gradient(180deg,_#ffffff_0%,_#f7fbff_100%)] p-6 shadow-[0_16px_34px_rgba(15,23,42,0.05)] mb-8">
                            <div class="flex flex-col xl:flex-row xl:items-start xl:justify-between gap-5">
                                <div>
                                    <div class="text-xs font-extrabold uppercase tracking-[0.18em] text-slate-400 mb-2">Practice Bank</div>
                                    <div class="flex items-end gap-3 mb-3">
                                        <div class="text-[54px] leading-none font-black tracking-[-0.05em] text-slate-900"><span class="mr-2">📚</span><span id="practice-total-count-display">180문항</span></div>
                                    </div>
                                    <div class="flex flex-wrap gap-2">
                                        <span class="inline-flex items-center rounded-full bg-blue-50 px-3 py-1.5 text-sm font-extrabold text-blue-600">🧭 Flow</span>
                                        <span class="inline-flex items-center rounded-full bg-indigo-50 px-3 py-1.5 text-sm font-extrabold text-indigo-600">💻 RTL</span>
                                        <span class="inline-flex items-center rounded-full bg-emerald-50 px-3 py-1.5 text-sm font-extrabold text-emerald-600">🛠️ Physical</span>
                                        <span class="inline-flex items-center rounded-full bg-orange-50 px-3 py-1.5 text-sm font-extrabold text-orange-600">💾 Memory</span>
                                        <span class="inline-flex items-center rounded-full bg-rose-50 px-3 py-1.5 text-sm font-extrabold text-rose-600">🏢 ADT</span>
                                    </div>
                                </div>

                                <div class="xl:min-w-[420px] rounded-[24px] border border-slate-100 bg-white/90 p-4">
                                    <div class="text-xs font-extrabold uppercase tracking-[0.16em] text-slate-400 mb-3">Difficulty Snapshot</div>
                                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                        <div class="rounded-2xl bg-[#f7fbff] border border-blue-100 px-4 py-4">
                                            <div class="text-xs font-extrabold text-blue-500 uppercase tracking-[0.16em] mb-1">🟦 기초</div>
                                            <div id="practice-summary-basic" class="text-[30px] leading-none font-black tracking-[-0.04em] text-slate-900">60문항</div>
                                        </div>
                                        <div class="rounded-2xl bg-[#f7fcfb] border border-emerald-100 px-4 py-4">
                                            <div class="text-xs font-extrabold text-emerald-500 uppercase tracking-[0.16em] mb-1">🟩 중간</div>
                                            <div id="practice-summary-mid" class="text-[30px] leading-none font-black tracking-[-0.04em] text-slate-900">58문항</div>
                                        </div>
                                        <div class="rounded-2xl bg-[#fff8fb] border border-rose-100 px-4 py-4">
                                            <div class="text-xs font-extrabold text-rose-500 uppercase tracking-[0.16em] mb-1">🟥 응용</div>
                                            <div id="practice-summary-advanced" class="text-[30px] leading-none font-black tracking-[-0.04em] text-slate-900">42문항</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="practice-filter-shell">
                            <div class="practice-filter-row">
                                <input id="practice-search" class="practice-input" type="search" placeholder="문제 문장, 해설, 키워드로 검색">
                                <select id="practice-topic-filter" class="practice-select">
                                    <option value="all">전체 카테고리</option>
                                </select>
                                <select id="practice-difficulty-filter" class="practice-select">
                                    <option value="all">전체 난이도</option>
                                </select>
                                <select id="practice-keyword-filter" class="practice-select">
                                    <option value="all">전체 키워드</option>
                                </select>
                                <button id="practice-reset" type="button" class="practice-reset">필터 초기화</button>
                            </div>
                            <div class="practice-filter-meta">
                                <div id="practice-count" class="practice-count">180문항 표시 중 / 전체 180문항</div>
                                <div id="practice-active-filters" class="practice-active-tags"></div>
                            </div>
                        </div>

                        <div id="practice-question-groups" class="practice-groups">
                            <!-- Practice question groups injected by JS -->
                        </div>
                    </section>
    </main>
    <script src="../assets/guidebook-page-common.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            window.GuidebookPage.initStandalonePage();
        });
    </script>
</body>
</html>
