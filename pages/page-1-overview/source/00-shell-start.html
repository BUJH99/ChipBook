<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverView | 반도체 디지털 회로설계 가이드북</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/guidebook-common.css">
    <style>
        .diagram-grid {
            background-color: #ffffff;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 16px 16px;
            background-position: center center;
        }

        .diagram-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            background-color: #ffffff;
        }

        .diagram-grid svg text {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.02em;
        }

        .wsts-article {
            position: relative;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 48%, #ffffff 100%);
            border-color: #dbeafe;
            box-shadow: 0 18px 44px rgba(37, 99, 235, 0.08);
        }

        .wsts-surface {
            border: 1px solid rgba(255, 255, 255, 0.95);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 255, 0.96) 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.96),
                0 18px 30px rgba(15, 23, 42, 0.06);
        }

        .wsts-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border-radius: 9999px;
            border: 1px solid transparent;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            line-height: 1;
            background: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .wsts-chip::before {
            content: "";
            width: 0.45rem;
            height: 0.45rem;
            border-radius: 9999px;
            background: currentColor;
            opacity: 0.9;
        }

        .wsts-chip-discrete {
            color: #d97706;
            border-color: #fcd34d;
            background: #fff7ed;
        }

        .wsts-chip-memory {
            color: #0f766e;
            border-color: #99f6e4;
            background: #ecfeff;
        }

        .wsts-chip-system {
            color: #7c3aed;
            border-color: #c4b5fd;
            background: #f5f3ff;
        }

        .wsts-chip-micro {
            color: #db2777;
            border-color: #f9a8d4;
            background: #fdf2f8;
        }

        .part1-tab-shell {
            --part1-tab-accent: #2563eb;
            margin-bottom: 1.5rem;
        }

        .part1-tab-top {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 1rem;
        }

        .part1-tab-top > div:first-child {
            flex: 1;
            min-width: 0;
        }

        .part1-tab-label {
            display: inline-flex;
            align-items: center;
            font-family: 'IBM Plex Sans', 'Pretendard', sans-serif;
            font-size: clamp(1.6rem, 2.3vw, 1.68rem);
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--part1-tab-accent);
            line-height: 1.08;
            font-variant-numeric: tabular-nums;
            margin-bottom: 0;
        }

        .part1-section-kicker {
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #0f172a;
            margin-bottom: 0;
            line-height: 1.15;
        }

        .part1-section-titleline {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #111827;
            line-height: 1.2;
        }

        .part1-section-line {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
        }

        .part1-section-icon {
            font-size: 1.05em;
            line-height: 1;
            transform: translateY(-0.02em);
        }

        .part1-section-head {
            margin-bottom: 1.5rem;
        }

        .part1-tab-copy {
            max-width: 820px;
            color: #64748b;
            font-size: 0.97rem;
            line-height: 1.7;
        }

        .part1-tab-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .part1-tab-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            min-height: 3.4rem;
            padding: 0.82rem 1rem;
            border-radius: 20px;
            border: 1px solid #dbeafe;
            background: rgba(255, 255, 255, 0.92);
            color: #475569;
            font-size: 0.92rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            transition: all 0.2s ease;
            text-align: left;
        }

        .part1-tab-btn:hover {
            border-color: #93c5fd;
            color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.08);
        }

        .part1-tab-btn.is-active {
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            border-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 16px 32px rgba(37, 99, 235, 0.18);
        }

        .part1-tab-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2.7rem;
            min-height: 2rem;
            padding: 0 0.7rem;
            border-radius: 999px;
            background: #eff6ff;
            color: #2563eb;
            font-size: 0.74rem;
            font-weight: 900;
            letter-spacing: 0.08em;
        }

        .part1-tab-btn.is-active .part1-tab-index {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .part1-tab-text {
            line-height: 1.3;
        }

        .high-na-euv-svg {
            position: relative;
            z-index: 1;
        }

        .high-na-euv-svg .high-na-euv-source-core,
        .high-na-euv-svg .high-na-euv-source-ring,
        .high-na-euv-svg .high-na-euv-beam-flow,
        .high-na-euv-svg .high-na-euv-cone,
        .high-na-euv-svg .high-na-euv-optics-shell,
        .high-na-euv-svg .high-na-euv-mask-pattern,
        .high-na-euv-svg .high-na-euv-scan-band,
        .high-na-euv-svg .high-na-euv-wafer-line,
        .high-na-euv-svg .high-na-euv-badge {
            transform-box: fill-box;
            transform-origin: center;
        }

        .high-na-euv-source-core {
            animation: high-na-euv-source-core 2.5s ease-in-out infinite;
        }

        .high-na-euv-source-ring {
            fill: none;
            stroke: rgba(196, 181, 253, 0.65);
            stroke-width: 1.5;
            animation: high-na-euv-source-ring 2.8s ease-out infinite;
        }

        .high-na-euv-source-ring.is-delayed {
            animation-delay: -1.4s;
        }

        .high-na-euv-beam-flow {
            stroke: rgba(255, 250, 235, 0.98);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-dasharray: 7 13;
            animation: high-na-euv-beam-flow 1.6s linear infinite;
        }

        .high-na-euv-beam-flow.is-delayed {
            animation-delay: -0.8s;
        }

        .high-na-euv-optics-shell {
            animation: high-na-euv-optics-float 3.6s ease-in-out infinite;
        }

        .high-na-euv-mask-pattern {
            animation: high-na-euv-mask-shift 2.3s linear infinite;
        }

        .high-na-euv-mask-pattern.is-delayed {
            animation-delay: -1.15s;
        }

        .high-na-euv-cone {
            animation: high-na-euv-cone 2.4s ease-in-out infinite;
        }

        .high-na-euv-scan-band {
            mix-blend-mode: screen;
            animation: high-na-euv-scan-band 2.5s ease-in-out infinite;
        }

        .high-na-euv-wafer-line {
            animation: high-na-euv-wafer-resolve 2.5s ease-in-out infinite;
        }

        .high-na-euv-badge {
            animation: high-na-euv-badge-rise 2.8s ease-in-out infinite;
        }

        .high-na-euv-badge.is-delayed {
            animation-delay: -1.2s;
        }

        .high-na-euv-stage:hover .high-na-euv-beam-flow,
        .high-na-euv-stage:hover .high-na-euv-scan-band {
            animation-duration: 1.05s;
        }

        @keyframes high-na-euv-source-core {
            0%, 100% {
                transform: scale(0.9);
                opacity: 0.74;
            }
            50% {
                transform: scale(1.18);
                opacity: 1;
            }
        }

        @keyframes high-na-euv-source-ring {
            0% {
                transform: scale(0.72);
                opacity: 0;
            }
            22% {
                opacity: 0.42;
            }
            100% {
                transform: scale(1.68);
                opacity: 0;
            }
        }

        @keyframes high-na-euv-beam-flow {
            from {
                stroke-dashoffset: 22;
            }
            to {
                stroke-dashoffset: -22;
            }
        }

        @keyframes high-na-euv-optics-float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-1.5px);
            }
        }

        @keyframes high-na-euv-mask-shift {
            from {
                stroke-dashoffset: 0;
            }
            to {
                stroke-dashoffset: -24;
            }
        }

        @keyframes high-na-euv-cone {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.56;
            }
        }

        @keyframes high-na-euv-scan-band {
            0% {
                transform: translateX(-30px);
                opacity: 0;
            }
            20% {
                opacity: 0.58;
            }
            82% {
                opacity: 0.7;
            }
            100% {
                transform: translateX(34px);
                opacity: 0;
            }
        }

        @keyframes high-na-euv-wafer-resolve {
            0%, 100% {
                opacity: 0.28;
                transform: scaleY(0.55);
            }
            46% {
                opacity: 1;
                transform: scaleY(1);
            }
        }

        @keyframes high-na-euv-badge-rise {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.84;
            }
            50% {
                transform: translateY(-1.6px);
                opacity: 1;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .high-na-euv-svg .high-na-euv-source-core,
            .high-na-euv-svg .high-na-euv-source-ring,
            .high-na-euv-svg .high-na-euv-beam-flow,
            .high-na-euv-svg .high-na-euv-cone,
            .high-na-euv-svg .high-na-euv-optics-shell,
            .high-na-euv-svg .high-na-euv-mask-pattern,
            .high-na-euv-svg .high-na-euv-scan-band,
            .high-na-euv-svg .high-na-euv-wafer-line,
            .high-na-euv-svg .high-na-euv-badge {
                animation: none !important;
            }
        }

        .on-device-ai-svg {
            position: relative;
            z-index: 1;
        }

        .on-device-ai-svg .on-device-ai-core,
        .on-device-ai-svg .on-device-ai-core-glow,
        .on-device-ai-svg .on-device-ai-flow,
        .on-device-ai-svg .on-device-ai-sensor,
        .on-device-ai-svg .on-device-ai-output,
        .on-device-ai-svg .on-device-ai-cache,
        .on-device-ai-svg .on-device-ai-badge {
            transform-box: fill-box;
            transform-origin: center;
        }

        .on-device-ai-core {
            animation: on-device-ai-core 2.8s ease-in-out infinite;
        }

        .on-device-ai-core-glow {
            animation: on-device-ai-core-glow 2.8s ease-in-out infinite;
        }

        .on-device-ai-flow {
            stroke-dasharray: 6 10;
            animation: on-device-ai-flow 1.7s linear infinite;
        }

        .on-device-ai-flow.is-delayed {
            animation-delay: -0.85s;
        }

        .on-device-ai-sensor,
        .on-device-ai-output {
            animation: on-device-ai-node 2.8s ease-in-out infinite;
        }

        .on-device-ai-sensor.is-2,
        .on-device-ai-output.is-2 {
            animation-delay: -0.7s;
        }

        .on-device-ai-sensor.is-3,
        .on-device-ai-output.is-3 {
            animation-delay: -1.4s;
        }

        .on-device-ai-cache {
            animation: on-device-ai-cache 2.6s ease-in-out infinite;
        }

        .on-device-ai-badge {
            animation: on-device-ai-badge 3s ease-in-out infinite;
        }

        .on-device-ai-stage:hover .on-device-ai-flow {
            animation-duration: 1.05s;
        }

        .on-device-ai-stage:hover .on-device-ai-core,
        .on-device-ai-stage:hover .on-device-ai-core-glow {
            animation-duration: 1.9s;
        }

        @keyframes on-device-ai-core {
            0%, 100% {
                transform: scale(0.96);
            }
            50% {
                transform: scale(1.04);
            }
        }

        @keyframes on-device-ai-core-glow {
            0%, 100% {
                opacity: 0.45;
                transform: scale(0.92);
            }
            50% {
                opacity: 0.95;
                transform: scale(1.08);
            }
        }

        @keyframes on-device-ai-flow {
            from {
                stroke-dashoffset: 18;
            }
            to {
                stroke-dashoffset: -18;
            }
        }

        @keyframes on-device-ai-node {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.92;
            }
            50% {
                transform: translateY(-1.5px);
                opacity: 1;
            }
        }

        @keyframes on-device-ai-cache {
            0%, 100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes on-device-ai-badge {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.85;
            }
            50% {
                transform: translateY(-1.5px);
                opacity: 1;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .on-device-ai-svg .on-device-ai-core,
            .on-device-ai-svg .on-device-ai-core-glow,
            .on-device-ai-svg .on-device-ai-flow,
            .on-device-ai-svg .on-device-ai-sensor,
            .on-device-ai-svg .on-device-ai-output,
            .on-device-ai-svg .on-device-ai-cache,
            .on-device-ai-svg .on-device-ai-badge {
                animation: none !important;
            }
        }

        [data-part1-panel-group][hidden],
        [data-part1-panel][hidden] {
            display: none !important;
        }

        @media (max-width: 767px) {
            .part1-tab-shell {
                padding-bottom: 1rem;
            }

            .part1-tab-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .part1-tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="page-standalone bg-white text-gray-900 selection:bg-blue-100" data-page-id="page-1">
    <main class="page-shell">
        <section class="page-section active" id="page-1">
            <div class="mb-4"><span class="badge">Part 1</span></div>
            <h2 class="section-title">OverView</h2>

            <div class="mb-8 space-y-8">
                    <div id="part1-current-shell" class="part1-tab-shell guidebook-section-head">
                        <div class="part1-tab-top guidebook-section-shell">
                            <div>
                                <div id="part1-current-label" class="part1-tab-label guidebook-section-kicker">1-1. Product Category</div>
                                <p id="part1-current-copy" class="part1-tab-copy guidebook-section-copy" hidden></p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-8" data-part1-panel-group>
                        <div class="grid grid-cols-1 gap-5">
