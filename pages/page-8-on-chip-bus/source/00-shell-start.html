      width: 100%;

    .arbiter-line {
      fill: none;
      stroke: #cbd5e1;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.82;
      transition: stroke 0.35s ease, opacity 0.35s ease, stroke-width 0.35s ease;
    }

    .arbiter-line-label {
      fill: #64748b;
      font-family: 'IBM Plex Sans', 'Pretendard', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.01em;
      transition: fill 0.35s ease, opacity 0.35s ease;
    }

    .arbiter-line.is-active {
      stroke: #16a34a;
      stroke-width: 5;
      stroke-dasharray: 14 10;
      animation: arbiterFlow 1.25s linear infinite;
      opacity: 1;
    }

    .arbiter-line.is-pending {
      stroke: #f59e0b;
      stroke-dasharray: 9 11;
      animation: arbiterFlow 1.55s linear infinite;
      opacity: 0.96;
    }

    .arbiter-line.is-reverse {
      animation-name: arbiterFlowReverse;
    }

    .arbiter-line.is-locked {
      stroke: #0f766e;
      stroke-dasharray: 10 8;
      animation-duration: 0.95s;
      opacity: 1;
    }

    .arbiter-line.is-active + .arbiter-line-label {
      fill: #15803d;
      opacity: 1;
    }

    .arbiter-line.is-pending + .arbiter-line-label {
      fill: #b45309;
      opacity: 1;
    }

    .arbiter-line.is-locked + .arbiter-line-label {
      fill: #0f766e;
      opacity: 1;
    }

    }

    .arbiter-node-shell,
    .arbiter-core-shell,
    .arbiter-bus-shell {
      transition: fill 0.35s ease, stroke 0.35s ease, filter 0.35s ease, transform 0.35s ease;
    }

    .arbiter-master-node .arbiter-node-shell {

    .arbiter-master-node .arbiter-node-pill {

    .arbiter-master-node .arbiter-node-pill-label {

      font-weight: 700;

    .arbiter-master-node .arbiter-lock-dot {

    .arbiter-master-node .arbiter-lock-glyph {
      fill: #94a3b8;

      font-size: 10px;
      font-weight: 700;
      text-anchor: middle;

      transition: fill 0.35s ease;
    }

    .arbiter-master-node.is-requesting .arbiter-node-shell {
      fill: #fffaf0;
      stroke: #f59e0b;
    }

    .arbiter-master-node.is-requesting .arbiter-node-pill {

    }

    .arbiter-master-node.is-granted .arbiter-node-shell {

    .arbiter-master-node.is-granted .arbiter-node-pill {

    }

    .arbiter-master-node.is-granted .arbiter-node-pill-label {

    }

    .arbiter-master-node.is-granted {

    }

    .arbiter-master-node.is-locked .arbiter-lock-dot {
      fill: rgba(15, 118, 110, 0.22);

    }

    .arbiter-master-node.is-locked .arbiter-lock-glyph {

    .arbiter-core-node .arbiter-core-halo {

    .arbiter-core-node.is-locked .arbiter-core-shell {

    .arbiter-bus-node.is-active .arbiter-bus-shell {

    .arbiter-bus-node.is-locked .arbiter-bus-shell {

    }

    .arbiter-lock-pill {
      transition: fill 0.35s ease, stroke 0.35s ease, opacity 0.35s ease;
    }

    .arbiter-lock-pill-label {
      font-family: 'IBM Plex Sans', 'Pretendard', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      fill: #94a3b8;
      transition: fill 0.35s ease;
    }

    .arbiter-lock-pill.is-active {
      fill: rgba(15, 118, 110, 0.16);
      stroke: #0f766e;

    }

    .arbiter-lock-pill:not(.is-active) {
      fill: rgba(226, 232, 240, 0.58);
      stroke: #cbd5e1;
      opacity: 0.9;
    }

    .arbiter-lock-pill.is-active + .arbiter-lock-pill-label {

    .arbiter-state-panel {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(209, 250, 229, 0.9);
      background: rgba(255, 255, 255, 0.88);

    }

    .arbiter-state-panel::before {

      border-radius: 9999px;
      background: rgba(34, 197, 94, 0.12);
      filter: blur(36px);
      pointer-events: none;
    }

    .arbiter-state-row {

      padding: 0.85rem 1rem;

    .arbiter-scene-btn {

      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background-color 0.25s ease, color 0.25s ease;

    .arbiter-scene-btn.is-active {

    }

    .ahb-logic-board {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(191, 219, 254, 0.82);
      background:
        radial-gradient(circle at 12% 22%, rgba(59, 130, 246, 0.14), transparent 28%),
        radial-gradient(circle at 52% 12%, rgba(139, 92, 246, 0.12), transparent 26%),
        radial-gradient(circle at 56% 78%, rgba(34, 197, 94, 0.12), transparent 30%),
        radial-gradient(circle at 88% 22%, rgba(14, 165, 233, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 252, 0.96) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.96), 0 18px 36px rgba(148, 163, 184, 0.08);

    .ahb-logic-board::before {

        linear-gradient(90deg, rgba(148, 163, 184, 0.08) 0, rgba(148, 163, 184, 0.08) 1px, transparent 1px, transparent 96px),
        linear-gradient(180deg, rgba(148, 163, 184, 0.06) 0, rgba(148, 163, 184, 0.06) 1px, transparent 1px, transparent 96px);
      mask-image: linear-gradient(180deg, rgba(15, 23, 42, 0.32) 0%, transparent 100%);
      pointer-events: none;
    }

    .ahb-logic-board::after {
      content: "";
      position: absolute;
      right: -52px;
      bottom: -78px;
      width: 240px;
      height: 240px;
      border-radius: 9999px;
      background: rgba(56, 189, 248, 0.12);
      filter: blur(48px);
      pointer-events: none;
    }

    .ahb-logic-svg {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: auto;
    }

    .ahb-stage-plane {
      opacity: 0.88;
      stroke-width: 1.8;
      filter: drop-shadow(0 18px 28px rgba(148, 163, 184, 0.08));
    }

    .ahb-logic-line {
      fill: none;
      stroke: #cbd5e1;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.82;
      transition: stroke 0.35s ease, stroke-width 0.35s ease, opacity 0.35s ease;
    }

    .ahb-logic-line.is-active {
      stroke: #16a34a;
      stroke-width: 5;
      stroke-dasharray: 14 10;
      animation: arbiterFlow 1.15s linear infinite;
      opacity: 1;
    }

    .ahb-logic-line.is-pending {
      stroke: #f59e0b;
      stroke-dasharray: 10 9;
      animation: arbiterFlow 1.5s linear infinite;
      opacity: 0.98;
    }

    .ahb-logic-line.is-lock {
      stroke: #0f766e;
      stroke-dasharray: 12 8;
      animation: arbiterFlow 0.92s linear infinite;
      opacity: 1;
    }

    .ahb-logic-line.is-feedback {
      stroke: #94a3b8;
      stroke-dasharray: 12 10;
      animation: arbiterFlowReverse 1.8s linear infinite;
      opacity: 0.86;
    }

    .ahb-logic-line.is-muted {
      opacity: 0.28;
    }

    .ahb-logic-token-group {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s ease, filter 0.32s ease;
    }

    .ahb-logic-token-group.is-active,
    .ahb-logic-token-group.is-pending,
    .ahb-logic-token-group.is-lock,
    .ahb-logic-token-group.is-feedback {
      opacity: 1;
    }

    .ahb-logic-token-group.is-muted {
      opacity: 0.14;
    }

    .ahb-logic-token {
      filter: drop-shadow(0 6px 10px rgba(15, 23, 42, 0.18));
      transition: fill 0.3s ease, opacity 0.3s ease;
    }

    .ahb-logic-token.is-secondary {
      opacity: 0.38;
    }

    .ahb-logic-token-group.is-active .ahb-logic-token {
      fill: #16a34a;
    }

    .ahb-logic-token-group.is-pending .ahb-logic-token {

    .ahb-logic-token-group.is-lock .ahb-logic-token {

    .ahb-logic-token-group.is-feedback .ahb-logic-token {

      font-weight: 700;

    .ahb-logic-stage,
    .ahb-logic-output {

      --tone-border: #dbe3ea;
      --tone-strong: #0f172a;
      --tone-shadow: rgba(148, 163, 184, 0.14);
      --tone-chip: rgba(226, 232, 240, 0.72);
      --tone-chip-text: #64748b;
      --tone-chip-active: rgba(226, 232, 240, 0.78);
      --tone-chip-text-active: #334155;
      --tone-meta: #64748b;
    }

    .ahb-logic-stage[data-logic-block="capture"] {
      --tone-fill: rgba(239, 246, 255, 0.96);
      --tone-border: #93c5fd;

    @keyframes arbiterFlow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -24; }
    }

    @keyframes arbiterFlowReverse {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: 24; }
    }

    @keyframes arbiterCorePulse {
      0%, 100% { opacity: 0.45; transform: scale(0.98); }
      50% { opacity: 0.92; transform: scale(1.03); }
    }

    @keyframes arbiterNodeLift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes arbiterGlowFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(8px, -10px, 0) scale(1.04); }
    }

    @keyframes ahbSignalFlowRight {
      0% { transform: translate3d(-110%, 0, 0); opacity: 0; }
      18% { opacity: 1; }
      82% { opacity: 1; }
      100% { transform: translate3d(210%, 0, 0); opacity: 0; }
    }

    @keyframes ahbSignalFlowLeft {
      0% { transform: translate3d(210%, 0, 0); opacity: 0; }
      18% { opacity: 1; }
      82% { opacity: 1; }
      100% { transform: translate3d(-110%, 0, 0); opacity: 0; }
    }

    @keyframes ahbSignalLockPulse {
      0%, 100% { box-shadow: 0 0 0 4px var(--soft), 0 10px 18px rgba(148, 163, 184, 0.12); }
      50% { box-shadow: 0 0 0 8px transparent, 0 12px 24px var(--glow); }
    }

    @keyframes hrespDashFlow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -52; }
    }

    @keyframes hrespDashFlowReverse {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: 52; }
    }

    @keyframes hrespStageA {
      0%, 10%, 100% { opacity: 0; }
      14%, 30% { opacity: 1; }
      36%, 100% { opacity: 0; }
    }

    @keyframes hrespStageB {
      0%, 30%, 100% { opacity: 0; }
      34%, 50% { opacity: 1; }
      56%, 100% { opacity: 0; }
    }

    @keyframes hrespStageC {
      0%, 50%, 100% { opacity: 0; }
      54%, 70% { opacity: 1; }
      76%, 100% { opacity: 0; }
    }

    @keyframes hrespStageD {
      0%, 70%, 100% { opacity: 0; }
      74%, 92% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
