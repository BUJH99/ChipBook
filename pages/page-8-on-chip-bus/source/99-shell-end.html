
    </section>
  </main>
  <script src="../assets/guidebook-page-common.js"></script>
  <script>
    const tabBtnBaseClass = 'tab-btn flex min-w-max items-center gap-3 rounded-[16px] border px-4 py-3 text-sm font-semibold transition-all duration-200 whitespace-nowrap text-left lg:w-full lg:min-w-0 lg:px-4 lg:py-3.5 lg:text-base';
    const tabBtnInactiveClass = `${tabBtnBaseClass} border-transparent text-gray-500 hover:border-gray-200 hover:bg-gray-50 hover:text-gray-900`;
    const tabBtnActiveClass = `${tabBtnBaseClass} bg-[#3182F6] border-blue-200 text-white shadow-md shadow-blue-200/50`;
    let part8SectionEngine = null;
    const syncPageHeight = () => {
      window.requestAnimationFrame(() => {
        if (part8SectionEngine) {
          part8SectionEngine.syncBridge();
          return;
        }
        window.GuidebookPage.notifyHeight();
      });
    };

    function restartAhbDescriptionAnimations() {
      const pulseNodes = Array.from(document.querySelectorAll('.ahb-arb-pulse'));
      const lockNodes = Array.from(document.querySelectorAll('.ahb-arb-lock-badge'));

      pulseNodes.forEach((node, index) => {
        node.style.setProperty('--ahb-delay', `${(index % 4) * 0.14}s`);
        node.style.animationName = 'none';
        void node.offsetWidth;
        node.style.animationName = '';
      });

      lockNodes.forEach((node, index) => {
        node.style.setProperty('--ahb-delay', `${0.12 + (index % 2) * 0.16}s`);
        node.style.animationName = 'none';
        void node.offsetWidth;
        node.style.animationName = '';
      });
    }

    const axisStreamLabPacketPalette = [
      { hex: '#2563eb' },
      { hex: '#059669' },
      { hex: '#f59e0b' },
      { hex: '#ea580c' },
      { hex: '#dc2626' },
      { hex: '#9333ea' },
    ];

    const axisStreamLabToneMap = {
      blue: '#2563eb',
      emerald: '#059669',
      amber: '#d97706',
      green: '#10b981',
      red: '#dc2626',
      slate: '#94a3b8',
    };

    function createAxisStreamLabDefaultSignals() {
      return {
        tvalid: false,
        tready: true,
        tlast: false,
        tuser: false,
        tkeep: [true, true, true, true],
        tstrb: [true, true, true, true],
        tid: 0,
        tdest: 0,
      };
    }

    const axisStreamLabState = {
      initialized: false,
      refs: null,
      signals: createAxisStreamLabDefaultSignals(),
      interconnectTready: true,
      fifo: [],
      maxFifo: 4,
      colorIndex: 0,
      clkCycle: 0,
      lastClockTick: 0,
      simSpeed: 1000,
      isPaused: false,
      rafId: 0,
      timeouts: new Set(),
      hubPulseToken: 0,
      routeToken: 0,
      routeColorHex: null,
      routeDest: null,
    };

    function hexToAxisStreamLabRgb(hex = '#3b82f6') {
      const normalized = hex.replace('#', '');
      const expanded = normalized.length === 3
        ? normalized.split('').map((char) => `${char}${char}`).join('')
        : normalized;
      if (expanded.length !== 6) return '59, 130, 246';
      const value = Number.parseInt(expanded, 16);
      if (Number.isNaN(value)) return '59, 130, 246';
      return `${(value >> 16) & 255}, ${(value >> 8) & 255}, ${value & 255}`;
    }

    function getAxisStreamLabThemeHexByColorIndex(colorIndex = 0) {
      return axisStreamLabPacketPalette[colorIndex]?.hex || axisStreamLabPacketPalette[0].hex;
    }

    function getAxisStreamLabResolvedHubColor() {
      if (axisStreamLabState.routeColorHex) {
        return axisStreamLabState.routeColorHex;
      }

      if (axisStreamLabState.fifo[0]) {
        return getAxisStreamLabThemeHexByColorIndex(axisStreamLabState.fifo[0].colorIndex);
      }

      return axisStreamLabPacketPalette[0].hex;
    }

    function getAxisStreamLabRefs() {
      if (axisStreamLabState.refs?.root?.isConnected) {
        return axisStreamLabState.refs;
      }

      const root = document.getElementById('axis-stream-channel-lab');
      if (!root) return null;

      axisStreamLabState.refs = {
        root,
        simArea: document.getElementById('axis-stream-lab-sim-area'),
        packetLane: document.getElementById('axis-stream-lab-packet-lane'),
        beam: document.getElementById('axis-stream-lab-beam-line'),
        clkCycle: document.getElementById('axis-stream-lab-clk-cycle'),
        txPulse: document.getElementById('axis-stream-lab-tx-pulse'),
        txStatusLabel: document.getElementById('axis-stream-lab-tx-status-label'),
        masterNode: document.getElementById('axis-stream-lab-master-node'),
        masterTreadyLed: document.getElementById('axis-stream-lab-master-tready-led'),
        masterTreadyText: document.getElementById('axis-stream-lab-master-tready-text'),
        switchNode: document.getElementById('axis-stream-lab-switch-node'),
        hubStatusText: document.getElementById('axis-stream-lab-hub-status-text'),
        resetButton: document.getElementById('axis-stream-lab-reset-sim'),
        pauseButton: document.getElementById('axis-stream-lab-toggle-pause'),
        pauseText: document.getElementById('axis-stream-lab-pause-text'),
        statusLed: document.getElementById('axis-stream-lab-status-led'),
        statusLabel: document.getElementById('axis-stream-lab-status-label'),
        bpWarning: document.getElementById('axis-stream-lab-bp-warning'),
        signalButtons: Array.from(root.querySelectorAll('[data-axis-sig]')),
        maskButtons: Array.from(root.querySelectorAll('[data-axis-mask]')),
        idButtons: Array.from(root.querySelectorAll('[data-axis-id]')),
        fifoSlots: Array.from(root.querySelectorAll('#axis-stream-lab-fifo-viz .axis-fifo-slot')),
        switchLeds: Array.from(root.querySelectorAll('.axis-switch-led')),
        slaveNodes: [0, 1, 2, 3].map((index) => document.getElementById(`axis-stream-lab-slave-node-${index}`)),
        valueEls: {
          tvalid: document.getElementById('axis-stream-lab-val-tvalid'),
          tready: document.getElementById('axis-stream-lab-val-tready'),
        },
      };

      return axisStreamLabState.refs;
    }

    function scheduleAxisStreamLabTimeout(callback, delay) {
      const timeoutId = window.setTimeout(() => {
        axisStreamLabState.timeouts.delete(timeoutId);
        callback();
      }, delay);
      axisStreamLabState.timeouts.add(timeoutId);
      return timeoutId;
    }

    function clearAxisStreamLabTimeouts() {
      axisStreamLabState.timeouts.forEach((timeoutId) => {
        window.clearTimeout(timeoutId);
      });
      axisStreamLabState.timeouts.clear();
    }

    function setAxisStreamLabStatus(text, tone = 'slate') {
      const refs = getAxisStreamLabRefs();
      if (!refs?.statusLed || !refs.statusLabel) return;

      const color = axisStreamLabToneMap[tone] || axisStreamLabToneMap.slate;
      refs.statusLed.style.backgroundColor = color;
      refs.statusLabel.textContent = text;
      refs.statusLabel.style.color = color;
    }

    function updateAxisStreamLabSignalButtons() {
      const refs = getAxisStreamLabRefs();
      if (!refs) return;

      refs.signalButtons.forEach((button) => {
        const sig = button.dataset.axisSig;
        const tone = button.dataset.tone || 'blue';
        const isActive = Boolean(axisStreamLabState.signals[sig]);
        const led = button.querySelector('.axis-sig-btn__led');
        button.classList.toggle('is-active', isActive);

        if (led) {
          led.style.backgroundColor = isActive ? axisStreamLabToneMap[tone] : '#e2e8f0';
          led.style.boxShadow = isActive ? `0 0 12px ${axisStreamLabToneMap[tone]}55` : 'none';
        }

        const valueEl = refs.valueEls[sig];
        if (valueEl) {
          valueEl.textContent = isActive ? 'HIGH' : 'LOW';
          valueEl.style.color = isActive ? axisStreamLabToneMap[tone] : '#cbd5e1';
        }
      });
    }

    function updateAxisStreamLabBitButtons() {
      const refs = getAxisStreamLabRefs();
      if (!refs) return;

      refs.maskButtons.forEach((button) => {
        const maskType = button.dataset.axisMask;
        const bitIndex = Number(button.dataset.axisIndex);
        button.classList.toggle('is-active', Boolean(axisStreamLabState.signals[maskType]?.[bitIndex]));
      });

      refs.idButtons.forEach((button) => {
        const idType = button.dataset.axisId;
        const value = Number(button.dataset.axisValue);
        button.classList.toggle('is-active', axisStreamLabState.signals[idType] === value);
      });
    }

    function syncAxisStreamLabHubVisuals(colorHex = getAxisStreamLabResolvedHubColor()) {
      const refs = getAxisStreamLabRefs();
      if (!refs?.switchNode) return;

      const rgb = hexToAxisStreamLabRgb(colorHex);
      refs.switchNode.style.setProperty('--axis-hub-color', colorHex);
      refs.switchNode.style.setProperty('--axis-hub-rgb', rgb);

      if (refs.beam) {
        refs.beam.style.setProperty('--beam-color', colorHex);
        refs.beam.style.setProperty('--beam-rgb', rgb);
      }

      refs.switchNode.classList.toggle(
        'has-payload',
        axisStreamLabState.fifo.length > 0 || Boolean(axisStreamLabState.routeColorHex)
      );
      refs.switchNode.classList.toggle('is-routing', Boolean(axisStreamLabState.routeColorHex));
    }

    function pulseAxisStreamLabHub(colorHex, options = {}) {
      const { routing = false, duration = 900, destIndex = null } = options;
      const refs = getAxisStreamLabRefs();
      if (!refs?.switchNode) return;

      if (routing) {
        axisStreamLabState.routeColorHex = colorHex;
        axisStreamLabState.routeDest = destIndex;
      }

      syncAxisStreamLabHubVisuals(colorHex);
      updateAxisStreamLabFifoViz();

      refs.switchNode.classList.remove('is-energized');
      void refs.switchNode.offsetWidth;
      refs.switchNode.classList.add('is-energized');

      const pulseToken = ++axisStreamLabState.hubPulseToken;
      scheduleAxisStreamLabTimeout(() => {
        if (pulseToken === axisStreamLabState.hubPulseToken) {
          refs.switchNode?.classList.remove('is-energized');
        }
      }, Math.max(680, Math.min(duration, 1400)));

      if (routing) {
        const routeToken = ++axisStreamLabState.routeToken;
        scheduleAxisStreamLabTimeout(() => {
          if (routeToken === axisStreamLabState.routeToken) {
            axisStreamLabState.routeColorHex = null;
            axisStreamLabState.routeDest = null;
            updateAxisStreamLabFifoViz();
          }
        }, duration);
      }
    }

    function updateAxisStreamLabFifoViz() {
      const refs = getAxisStreamLabRefs();
      if (!refs) return;

      refs.fifoSlots.forEach((slot, index) => {
        const packet = axisStreamLabState.fifo[index];
        const colorHex = packet ? getAxisStreamLabThemeHexByColorIndex(packet.colorIndex) : null;

        slot.classList.toggle('is-full', Boolean(packet));
        slot.style.backgroundColor = colorHex || '#dbe3ee';
        slot.style.boxShadow = colorHex ? `0 0 12px ${colorHex}55` : 'none';
        slot.style.opacity = packet ? '1' : '0.55';
      });

      if (refs.hubStatusText) {
        refs.hubStatusText.textContent = `FIFO: ${axisStreamLabState.fifo.length}/${axisStreamLabState.maxFifo}`;
      }

      axisStreamLabState.interconnectTready = axisStreamLabState.fifo.length < axisStreamLabState.maxFifo;

      if (refs.masterTreadyLed && refs.masterTreadyText) {
        refs.masterTreadyLed.style.backgroundColor = axisStreamLabState.interconnectTready ? '#0f172a' : '#dc2626';
        refs.masterTreadyText.textContent = axisStreamLabState.interconnectTready ? 'Interconnect Ready' : 'FIFO FULL (BP)';
      }

      refs.masterNode?.classList.toggle('is-link-ready', axisStreamLabState.interconnectTready);
      refs.masterNode?.classList.toggle('is-link-blocked', !axisStreamLabState.interconnectTready);
      applyAxisStreamLabMasterState(deriveAxisStreamLabMasterState());

      if (refs.bpWarning) {
        refs.bpWarning.classList.toggle('is-visible', !axisStreamLabState.interconnectTready);
      }

      const resolvedHubColor = getAxisStreamLabResolvedHubColor();
      refs.switchLeds.forEach((led, index) => {
        const routedActive = axisStreamLabState.routeDest === index;
        const queuedPacket = axisStreamLabState.fifo.find((packet) => packet.tdest === index);
        const tone = routedActive
          ? (axisStreamLabState.routeColorHex || resolvedHubColor)
          : queuedPacket
            ? getAxisStreamLabThemeHexByColorIndex(queuedPacket.colorIndex)
            : '#334155';
        const isActive = routedActive || Boolean(queuedPacket);

        led.classList.toggle('is-active', isActive);
        led.classList.toggle('is-route-active', routedActive);
        led.style.backgroundColor = isActive ? tone : '#334155';
        led.style.boxShadow = isActive ? `0 0 14px ${tone}66` : 'none';
        led.style.opacity = isActive ? '1' : '0.72';
      });

      syncAxisStreamLabHubVisuals(resolvedHubColor);
    }

    function updateAxisStreamLabPauseButton() {
      const refs = getAxisStreamLabRefs();
      if (!refs?.pauseButton || !refs.pauseText || !refs.root) return;

      const pauseLabel = axisStreamLabState.isPaused ? 'Resume Engine' : 'Pause Engine';
      refs.pauseText.textContent = pauseLabel;
      refs.pauseButton.setAttribute('aria-label', pauseLabel);
      refs.pauseButton.setAttribute('title', pauseLabel);
      refs.pauseButton.classList.toggle('is-paused', axisStreamLabState.isPaused);
      refs.root.classList.toggle('is-paused', axisStreamLabState.isPaused);
    }

    function deriveAxisStreamLabMasterState({ handshake = false } = {}) {
      if (handshake) return 'driving';
      if (!axisStreamLabState.signals.tvalid) return 'idle';
      return axisStreamLabState.interconnectTready ? 'armed' : 'stalled';
    }

    function getAxisStreamLabMasterThemeHex(masterState = 'idle') {
      if (masterState === 'stalled') {
        return axisStreamLabToneMap.amber;
      }

      return getAxisStreamLabThemeHexByColorIndex(axisStreamLabState.colorIndex);
    }

    function applyAxisStreamLabMasterState(masterState = 'idle') {
      const refs = getAxisStreamLabRefs();
      if (!refs?.masterNode) return;

      const themeHex = getAxisStreamLabMasterThemeHex(masterState);
      refs.masterNode.style.setProperty('--axis-master-color', themeHex);
      refs.masterNode.style.setProperty('--axis-master-rgb', hexToAxisStreamLabRgb(themeHex));
      refs.masterNode.classList.remove('is-idle', 'is-armed', 'is-driving', 'is-stalled');
      refs.masterNode.classList.add(`is-${masterState}`);

      if (refs.txStatusLabel) {
        refs.txStatusLabel.textContent = ({
          idle: 'IDLE',
          armed: 'ARMED',
          driving: 'DRIVING',
          stalled: 'STALLED',
        })[masterState] || 'IDLE';
      }
    }

    function refreshAxisStreamLabUI() {
      const refs = getAxisStreamLabRefs();
      if (!refs) return;

      if (refs.clkCycle) {
        refs.clkCycle.textContent = `${axisStreamLabState.clkCycle.toFixed(1)}ns`;
      }

      applyAxisStreamLabMasterState(deriveAxisStreamLabMasterState());
      refs.masterNode?.classList.remove('is-bursting');
      refs.txPulse?.classList.remove('is-firing');
      updateAxisStreamLabSignalButtons();
      updateAxisStreamLabBitButtons();
      updateAxisStreamLabFifoViz();
      updateAxisStreamLabPauseButton();
      setAxisStreamLabStatus('Back-pressure Monitor Active', 'slate');
    }

    function resetAxisStreamLab(options = {}) {
      const keepPause = options.keepPause === true;
      const refs = getAxisStreamLabRefs();
      if (!refs) return;

      clearAxisStreamLabTimeouts();
      refs.packetLane.innerHTML = '';
      refs.beam.style.opacity = '0';
      refs.beam.classList.remove('is-active');
      refs.switchNode?.classList.remove('is-energized', 'is-routing');
      refs.slaveNodes.forEach((node) => node?.classList.remove('is-active'));

      axisStreamLabState.signals = createAxisStreamLabDefaultSignals();
      axisStreamLabState.interconnectTready = true;
      axisStreamLabState.fifo = [];
      axisStreamLabState.colorIndex = 0;
      axisStreamLabState.clkCycle = 0;
      axisStreamLabState.lastClockTick = 0;
      axisStreamLabState.hubPulseToken = 0;
      axisStreamLabState.routeToken = 0;
      axisStreamLabState.routeColorHex = null;
      axisStreamLabState.routeDest = null;
      if (!keepPause) {
        axisStreamLabState.isPaused = false;
      }

      refreshAxisStreamLabUI();
      window.setTimeout(syncPageHeight, 40);
    }

    function createAxisStreamLabPacketMarkup(packetData, mode = 'master') {
      const theme = axisStreamLabPacketPalette[packetData.colorIndex] || axisStreamLabPacketPalette[0];
      const shapeClass = `shape-${packetData.tid}`;

      if (mode === 'master') {
        return `
          <div class="axis-packet__body ${shapeClass}" style="--axis-packet-color:${theme.hex};">
            ${packetData.tuser ? '<div class="axis-packet__user-tag">U:0x0A</div>' : ''}
            <div class="axis-packet__headline mono">0x${packetData.data}</div>
            <div class="axis-packet__sub mono">TDEST:${packetData.tdest} / TID:${packetData.tid}</div>
          </div>
        `;
      }

      const bytesMarkup = [3, 2, 1, 0].map((index) => {
        const keep = packetData.tkeep[index];
        const strobe = packetData.tstrb[index];
        const byteData = packetData.data.substring((3 - index) * 2, (3 - index) * 2 + 2);
        const classes = [
          'axis-byte',
          keep ? '' : 'is-keep-off',
          keep && !strobe ? 'is-strobe-off' : '',
        ].filter(Boolean).join(' ');
        return `<div class="${classes}">${byteData}</div>`;
      }).join('');

      return `
        <div class="axis-packet__body ${shapeClass}" style="--axis-packet-color:${theme.hex};">
          ${packetData.tuser ? '<div class="axis-packet__user-tag">U:0x0A</div>' : ''}
          <div class="axis-packet__route-tag">ID:${packetData.tid} D:${packetData.tdest}</div>
          <div class="axis-packet__bytes">${bytesMarkup}</div>
          <div class="axis-packet__headline mono">0x${packetData.data}</div>
          ${packetData.tlast ? '<div class="axis-packet__last-tag">TLAST</div>' : ''}
        </div>
      `;
    }

    function flashAxisStreamLabSlave(targetId) {
      const refs = getAxisStreamLabRefs();
      const slave = refs?.slaveNodes?.[targetId];
      if (!slave) return;
      slave.classList.add('is-active');
      scheduleAxisStreamLabTimeout(() => {
        slave.classList.remove('is-active');
      }, 620);
    }

    function fireAxisStreamLabTxPulse() {
      const refs = getAxisStreamLabRefs();
      if (!refs?.txPulse) return;
      refs.masterNode?.classList.remove('is-bursting');
      void refs.masterNode?.offsetWidth;
      refs.masterNode?.classList.add('is-bursting');
      refs.txPulse.classList.add('is-firing');
      scheduleAxisStreamLabTimeout(() => {
        refs.txPulse?.classList.remove('is-firing');
        refs.masterNode?.classList.remove('is-bursting');
      }, 320);
    }

    function driveAxisStreamLabMasterPacket() {
      const refs = getAxisStreamLabRefs();
      if (!refs?.packetLane || !refs.packetLane.clientWidth) return;

      const dataVal = Math.floor(Math.random() * 0xFFFFFFFF).toString(16).toUpperCase().padStart(8, '0');
      const packetData = {
        data: dataVal,
        tid: axisStreamLabState.signals.tid,
        tdest: axisStreamLabState.signals.tdest,
        tuser: axisStreamLabState.signals.tuser,
        tlast: axisStreamLabState.signals.tlast,
        tkeep: [...axisStreamLabState.signals.tkeep],
        tstrb: [...axisStreamLabState.signals.tstrb],
        colorIndex: axisStreamLabState.colorIndex,
      };

      const laneRect = refs.packetLane.getBoundingClientRect();
      const masterRect = refs.masterNode?.getBoundingClientRect();
      const startX = masterRect
        ? Math.max(88, masterRect.right - laneRect.left - 20)
        : 104;
      const switchX = refs.packetLane.clientWidth * 0.75 - 76;
      const packet = document.createElement('div');
      packet.className = 'axis-packet';
      packet.style.left = `${startX}px`;
      packet.style.marginTop = '-30px';
      packet.innerHTML = createAxisStreamLabPacketMarkup(packetData, 'master');
      refs.packetLane.appendChild(packet);

      window.requestAnimationFrame(() => {
        packet.style.transform = `translate3d(${switchX - startX}px, 0, 0)`;
      });

      scheduleAxisStreamLabTimeout(() => {
        packet.remove();
        axisStreamLabState.fifo.push(packetData);
        updateAxisStreamLabFifoViz();
        pulseAxisStreamLabHub(getAxisStreamLabThemeHexByColorIndex(packetData.colorIndex), { duration: 820 });
      }, 1000);

      if (axisStreamLabState.signals.tlast) {
        axisStreamLabState.colorIndex = (axisStreamLabState.colorIndex + 1) % axisStreamLabPacketPalette.length;
      }
    }

    function popAxisStreamLabInterconnectPacket() {
      const refs = getAxisStreamLabRefs();
      if (!refs?.packetLane || axisStreamLabState.fifo.length === 0) return;
      if (!refs.packetLane.clientWidth || !refs.packetLane.clientHeight) return;

      const packetData = axisStreamLabState.fifo.shift();
      const slave = refs.slaveNodes[packetData.tdest];
      if (!slave) {
        updateAxisStreamLabFifoViz();
        return;
      }

      updateAxisStreamLabFifoViz();

      const startX = refs.packetLane.clientWidth * 0.75 - 76;
      const packet = document.createElement('div');
      packet.className = 'axis-packet';
      packet.style.left = `${startX}px`;
      packet.style.marginTop = '-34px';
      packet.innerHTML = createAxisStreamLabPacketMarkup(packetData, 'detail');
      refs.packetLane.appendChild(packet);

      const canvasRect = refs.simArea.getBoundingClientRect();
      const hubRect = refs.switchNode.getBoundingClientRect();
      const slaveRect = slave.getBoundingClientRect();
      const x1 = hubRect.left + hubRect.width / 2 - canvasRect.left;
      const y1 = hubRect.top + hubRect.height / 2 - canvasRect.top;
      const x2 = slaveRect.left + slaveRect.width / 2 - canvasRect.left;
      const y2 = slaveRect.top + slaveRect.height / 2 - canvasRect.top;
      const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
      const distance = Math.hypot(x2 - x1, y2 - y1);
      const theme = axisStreamLabPacketPalette[packetData.colorIndex] || axisStreamLabPacketPalette[0];
      const beamRgb = hexToAxisStreamLabRgb(theme.hex);

      refs.beam.style.setProperty('--beam-color', theme.hex);
      refs.beam.style.setProperty('--beam-rgb', beamRgb);
      refs.beam.style.width = `${distance}px`;
      refs.beam.style.left = `${x1}px`;
      refs.beam.style.top = `${y1}px`;
      refs.beam.style.transform = `rotate(${angle}deg)`;
      refs.beam.style.opacity = '0.6';
      refs.beam.classList.add('is-active');
      pulseAxisStreamLabHub(theme.hex, {
        routing: true,
        duration: 1260,
        destIndex: packetData.tdest,
      });

      window.requestAnimationFrame(() => {
        const laneRect = refs.packetLane.getBoundingClientRect();
        const packetRect = packet.getBoundingClientRect();
        const targetCenterX = slaveRect.left + slaveRect.width / 2 - laneRect.left;
        const targetCenterY = slaveRect.top + slaveRect.height / 2 - laneRect.top;
        const startCenterX = packetRect.left + packetRect.width / 2 - laneRect.left;
        const startCenterY = packetRect.top + packetRect.height / 2 - laneRect.top;
        const deltaX = targetCenterX - startCenterX;
        const deltaY = targetCenterY - startCenterY;
        packet.style.transform = `translate3d(${deltaX}px, ${deltaY}px, 0)`;
      });

      scheduleAxisStreamLabTimeout(() => {
        packet.style.opacity = '0';
        refs.beam.style.opacity = '0';
        refs.beam.classList.remove('is-active');
        flashAxisStreamLabSlave(packetData.tdest);
        scheduleAxisStreamLabTimeout(() => {
          packet.remove();
        }, 360);
      }, 1200);
    }

    function toggleAxisStreamLabPause() {
      axisStreamLabState.isPaused = !axisStreamLabState.isPaused;
      updateAxisStreamLabPauseButton();
    }

    function handleAxisStreamLabResize() {
      const refs = getAxisStreamLabRefs();
      if (!refs?.beam) return;
      refs.beam.style.opacity = '0';
      refs.beam.classList.remove('is-active');
      window.setTimeout(syncPageHeight, 20);
    }

    function bindAxisStreamLabEvents() {
      const refs = getAxisStreamLabRefs();
      if (!refs || refs.root.dataset.axisLabBound === 'true') return;

      refs.signalButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const sig = button.dataset.axisSig;
          axisStreamLabState.signals[sig] = !axisStreamLabState.signals[sig];
          updateAxisStreamLabSignalButtons();
          applyAxisStreamLabMasterState(deriveAxisStreamLabMasterState());
        });
      });

      refs.maskButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const maskType = button.dataset.axisMask;
          const bitIndex = Number(button.dataset.axisIndex);

    function initializeAxiStreamChannelLab(forceRefresh = false) {
      const refs = getAxisStreamLabRefs();
      if (!refs) return;

      bindAxisStreamLabEvents();

      if (!axisStreamLabState.initialized) {
        axisStreamLabState.initialized = true;
        resetAxisStreamLab();
        axisStreamLabState.rafId = window.requestAnimationFrame(runAxisStreamLabLoop);
      } else if (forceRefresh) {
        refreshAxisStreamLabUI();
      }

    function runAxisStreamLabLoop(timestamp) {
      const refs = getAxisStreamLabRefs();
      if (!refs) {
        axisStreamLabState.rafId = window.requestAnimationFrame(runAxisStreamLabLoop);
        return;
      }

      if (!axisStreamLabState.lastClockTick) {
        axisStreamLabState.lastClockTick = timestamp;
      }

      const elapsed = timestamp - axisStreamLabState.lastClockTick;

      if (!axisStreamLabState.isPaused && elapsed > axisStreamLabState.simSpeed) {
        axisStreamLabState.lastClockTick = timestamp;
        axisStreamLabState.clkCycle += 1.0;

        if (refs.clkCycle) {
          refs.clkCycle.textContent = `${axisStreamLabState.clkCycle.toFixed(1)}ns`;
        }

        if (axisStreamLabState.signals.tready && axisStreamLabState.fifo.length > 0) {
          popAxisStreamLabInterconnectPacket();
        }

        const masterHandshake = axisStreamLabState.signals.tvalid && axisStreamLabState.interconnectTready;

        if (masterHandshake) {
          driveAxisStreamLabMasterPacket();
          applyAxisStreamLabMasterState('driving');
          fireAxisStreamLabTxPulse();
        } else {
          applyAxisStreamLabMasterState(deriveAxisStreamLabMasterState());
        }

        if (masterHandshake) {
          setAxisStreamLabStatus('Transfer Active', 'green');
        } else if (!axisStreamLabState.interconnectTready) {
          setAxisStreamLabStatus('Back-pressure Stalled', 'red');
        } else if (!axisStreamLabState.signals.tready && axisStreamLabState.fifo.length > 0) {
          setAxisStreamLabStatus('Sink Waiting', 'amber');
        } else {
          setAxisStreamLabStatus('Ready', 'blue');
        }
      } else if (axisStreamLabState.isPaused) {
        axisStreamLabState.lastClockTick = timestamp;
      }

      axisStreamLabState.rafId = window.requestAnimationFrame(runAxisStreamLabLoop);
    }

    function startBusInterfaceLabPacketAnimation(sequence) {
      const refs = getBusInterfaceLabRefs();
      if (!refs?.packet || !refs.packetMotion || !sequence?.length) return;

      stopBusInterfaceVisualization();
      busInterfaceLabState.packetStep = 0;
      refs.packet.style.visibility = 'visible';

      const animatePacket = () => {
        const step = sequence[busInterfaceLabState.packetStep % sequence.length];
        refs.packet.setAttribute('fill', step.fill);
        refs.packet.style.filter = `drop-shadow(0 0 4px ${step.fill})`;
        refs.packetMotion.setAttribute('path', step.path);
        refs.packetMotion.beginElement();
        busInterfaceLabState.packetStep += 1;
      };

      animatePacket();
      busInterfaceLabState.timerId = window.setInterval(animatePacket, 2000);
    }

      refs.buttons.forEach((button) => {
        const isActive = button.dataset.busInterfaceMode === mode;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', String(isActive));

      refs.statusText.textContent = content.status;

    function formatHex(value) {
      return `0x${value.toString(16).toUpperCase()}`;
    }

    function createIncrAddresses(start, beats, step) {
      return Array.from({ length: beats }, (_, index) => formatHex(start + (index * step)));
    }

    function createWrapAddresses(start, beats, step) {
      const windowSize = beats * step;
      const base = Math.floor(start / windowSize) * windowSize;
      return Array.from({ length: beats }, (_, index) => {
        const offset = (start - base + (index * step)) % windowSize;
        return formatHex(base + offset);
      });
    }

    function createAhbTransferPairWave({ title, hsizeLabel, hburstLabel, addrA, addrB }) {
      return {
        signal: [
          { name: 'HCLK', wave: 'p.......' },
          { name: 'HADDR', wave: 'x==x....', data: [addrA, addrB] },
          { name: 'HWRITE', wave: 'x10x....' },
          { name: 'HSIZE', wave: 'x22x....', data: [hsizeLabel, hsizeLabel] },
          { name: 'HBURST', wave: 'x22x....', data: [hburstLabel, hburstLabel] },
          { name: 'HTRANS', wave: 'x==x....', data: ['NONSEQ', 'NONSEQ'] },
          { name: 'HWDATA', wave: 'xx=x....', data: [`WData ${hsizeLabel}`] },
          { name: 'HRDATA', wave: 'xxx=....', data: [`RData ${hsizeLabel}`] },
          { name: 'HREADY', wave: '1.......' }
        ],
        head: { text: title, tick: 0 },
        config: { hscale: 1.5 }
      };
    }

    function createAhbSingleBurstWave({ title, hsizeLabel, hburstLabel, address }) {
      return {
        signal: [
          { name: 'HCLK', wave: 'p.....' },
          { name: 'HADDR', wave: 'x=x...' , data: [address] },
          { name: 'HWRITE', wave: 'x1x...' },
          { name: 'HSIZE', wave: 'x2x...', data: [hsizeLabel] },
          { name: 'HBURST', wave: 'x2x...', data: [hburstLabel] },
          { name: 'HTRANS', wave: 'x=x...', data: ['NONSEQ'] },
          { name: 'HWDATA', wave: 'xx=x..', data: [`D(${address})`] },
          { name: 'HREADY', wave: '1.....' }
        ],
        head: { text: title, tick: 0 },
        config: { hscale: 1.5 }
      };
    }

    function createAhbBurstWave({ title, hsizeLabel, hburstLabel, addresses }) {
      const beats = addresses.length;
      const hclkWave = `p${'.'.repeat(beats + 3)}`;
      const addrWave = `x${'='.repeat(beats)}xx.`;
      const scalarWave = `x2${'.'.repeat(Math.max(beats - 1, 0))}xx.`;
      const transWave = `x${'='.repeat(beats)}xx.`;
      const dataWave = `xx${'='.repeat(beats)}x.`;
      const readyWave = `1${'.'.repeat(beats + 3)}`;
      const dataLabels = addresses.map((_, index) => `D${index}`);
      const hscale = beats >= 16 ? 2.6 : beats >= 8 ? 2.2 : 1.8;
      const diagramMinWidth = beats >= 16 ? 2600 : beats >= 8 ? 1800 : 1320;

      return {
        signal: [
          { name: 'HCLK', wave: hclkWave },
          { name: 'HADDR', wave: addrWave, data: addresses },
          { name: 'HWRITE', wave: `x1${'.'.repeat(Math.max(beats - 1, 0))}xx.` },
          { name: 'HSIZE', wave: scalarWave, data: [hsizeLabel] },
          { name: 'HBURST', wave: scalarWave, data: [hburstLabel] },
          { name: 'HTRANS', wave: transWave, data: ['NONSEQ', ...Array.from({ length: Math.max(beats - 1, 0) }, () => 'SEQ')] },
          { name: 'HWDATA', wave: dataWave, data: dataLabels },
          { name: 'HREADY', wave: readyWave }
        ],
        head: { text: title, tick: 0 },
        config: { hscale, diagramMinWidth }
      };
    }

                '<code>HBURST=001</code> 기반 incrementing burst 예시',
                '표시 구간 6-beat 기준의 선형 주소 증가 패턴',
                '<code>NONSEQ</code> 뒤 연속 <code>SEQ</code> 전개 구조',
                '고정 경계 복귀 없는 가변 길이 burst 기준'
              ]
            ];
          }

          const wrapBoundary = example.beats * 4;
          const isWrap = example.kind === 'wrap';
          return [
            example.key,
            [
              `<code>HBURST=${example.code}</code> 기반 ${example.label} burst 구조`,
              `${example.beats}-beat 고정 길이 burst 전개`,
              isWrap
                ? `${wrapBoundary}Byte wrap boundary 기준의 주소 순환 패턴`
                : '4Byte stride 기준의 선형 주소 증가 패턴',
              isWrap
                ? 'wrap boundary 도달 뒤 시작 경계 복귀 관계'
                : `제${example.beats} beat 종료 시점의 burst completion 기준`
            ]
          ];
        })
      )
    );

    let internalArbiterStateIndex = 0;

    function getSelectedWaveType(selector, fallbackType) {
      const activeButton = document.querySelector(`${selector}[class*="bg-white"]`);
      return activeButton?.getAttribute('data-wave') || fallbackType;
    }

    function setInternalArbiterLine(element, state = '') {
      if (!element) return;
      const mappedState = state === 'is-req'
        ? 'signal-req'
        : state === 'is-compare'
          ? 'signal-req'
          : state === 'is-gnt'
            ? 'signal-gnt'
            : state === 'is-master'
              ? 'signal-master'
              : '';
      element.setAttribute('class', ['signal-line', mappedState].filter(Boolean).join(' '));
    }

    function setInternalArbiterMuxPath(element, isActive = false) {
      if (!element) return;
      element.setAttribute('class', `mux-path${isActive ? ' active' : ''}`);
    }

    function setInternalArbiterTextColor(element, color = '#64748B') {
      if (!element) return;
      element.style.fill = color;
    }

    function setInternalArbiterMasterTone(element, tone = '') {
      if (!element) return;
      element.classList.remove('is-requesting', 'is-granted');
      if (tone) {
        element.classList.add(`is-${tone}`);
      }
    }

    function setInternalArbiterMasterStateText(element, text = 'IDLE') {
      if (!element) return;
      element.textContent = text;
    }

    function activateInternalArbiterBox(element, toneClass) {
      if (!element) return;
      element.classList.add('arbiter-internal-box-active', toneClass);
      element.classList.add('arb-box-active');
    }

    function syncInternalArbiterFlowStages(activeStages = []) {
      const stageSet = new Set(activeStages);
      internalArbiterRefs.flowChips.forEach((chip) => {
        chip.classList.toggle('is-active', stageSet.has(chip.dataset.flowStage));
      });
    }

    function syncInternalArbiterStepButtons(activeStepIndex) {
      internalArbiterRefs.stepButtons.forEach((button) => {
        const buttonStep = Number(button.dataset.arbiterStep);
        button.classList.toggle('is-active', buttonStep === activeStepIndex);
        button.setAttribute('aria-pressed', String(buttonStep === activeStepIndex));
      });
    }

    function resetInternalArbiterAnimation() {
      if (!internalArbiterRefs.desc) return;

      ['req0', 'req1', 'gnt0', 'gnt1', 'win', 'hmaster'].forEach((key) => {
        setInternalArbiterLine(internalArbiterRefs[key]);
      });
      setInternalArbiterMuxPath(internalArbiterRefs.muxM0, false);
      setInternalArbiterMuxPath(internalArbiterRefs.muxM1, false);
      setInternalArbiterMasterTone(internalArbiterRefs.master0);
      setInternalArbiterMasterTone(internalArbiterRefs.master1);
      setInternalArbiterMasterStateText(internalArbiterRefs.master0State, 'IDLE');
      setInternalArbiterMasterStateText(internalArbiterRefs.master1State, 'IDLE');
      syncInternalArbiterFlowStages([]);

      [internalArbiterRefs.priorityBox, internalArbiterRefs.ctrlBox].forEach((box) => {
        box?.classList.remove('arbiter-internal-box-active', 'arb-box-active', 'is-priority', 'is-control');
      });

      internalArbiterRefs.mux?.classList.remove('is-active');
      internalArbiterRefs.muxOut?.classList.remove('is-active');

      [internalArbiterRefs.txtReq0, internalArbiterRefs.txtReq1, internalArbiterRefs.txtGnt0, internalArbiterRefs.txtGnt1, internalArbiterRefs.txtWin, internalArbiterRefs.txtHmaster]
        .forEach((element) => setInternalArbiterTextColor(element));

      if (internalArbiterRefs.txtWin) {
        internalArbiterRefs.txtWin.textContent = 'Eval';
      }

      internalArbiterRefs.desc.className = 'arbiter-internal-desc';
      internalArbiterRefs.desc.textContent = 'IDLE: 버스 요청 대기 중...';
    }

    function applyInternalArbiterAnimationStep(nextStep = 0) {
      if (!internalArbiterRefs.desc) return;

      internalArbiterStateIndex = ((nextStep % 5) + 5) % 5;
      resetInternalArbiterAnimation();

      switch (internalArbiterStateIndex) {
        case 1:
          syncInternalArbiterFlowStages(['request', 'compare']);
          setInternalArbiterMasterTone(internalArbiterRefs.master0, 'requesting');
          setInternalArbiterMasterStateText(internalArbiterRefs.master0State, 'REQ');
          setInternalArbiterLine(internalArbiterRefs.req0, 'is-req');
          setInternalArbiterLine(internalArbiterRefs.win, 'is-compare');
          setInternalArbiterTextColor(internalArbiterRefs.txtReq0, '#F59E0B');
          setInternalArbiterTextColor(internalArbiterRefs.txtWin, '#F59E0B');
          if (internalArbiterRefs.txtWin) {
            internalArbiterRefs.txtWin.textContent = 'M0 Win';
          }
          activateInternalArbiterBox(internalArbiterRefs.priorityBox, 'is-priority');
          internalArbiterRefs.desc.className = 'arbiter-internal-desc is-request';
          internalArbiterRefs.desc.textContent = '[Step 1] Master 0가 HBUSREQ0를 올리면 Priority Logic이 활성 요청을 비교해 winner를 M0로 결정합니다.';
          break;
        case 2:
          syncInternalArbiterFlowStages(['grant', 'select']);
          setInternalArbiterMasterTone(internalArbiterRefs.master0, 'granted');
          setInternalArbiterMasterStateText(internalArbiterRefs.master0State, 'GNT');
          setInternalArbiterLine(internalArbiterRefs.gnt0, 'is-gnt');
          setInternalArbiterLine(internalArbiterRefs.hmaster, 'is-master');
          setInternalArbiterTextColor(internalArbiterRefs.txtGnt0, '#22C55E');
          setInternalArbiterTextColor(internalArbiterRefs.txtHmaster, '#3B82F6');
          activateInternalArbiterBox(internalArbiterRefs.ctrlBox, 'is-control');
          setInternalArbiterMuxPath(internalArbiterRefs.muxM0, true);
          internalArbiterRefs.mux?.classList.add('is-active');
          internalArbiterRefs.muxOut?.classList.add('is-active');
          internalArbiterRefs.desc.className = 'arbiter-internal-desc is-grant';
          internalArbiterRefs.desc.textContent = '[Step 2] Control FSM이 HGRANT0와 HMASTER=0을 출력하고 MUX가 Master 0 Addr/Data 경로를 연결합니다.';
          break;
        case 3:
          syncInternalArbiterFlowStages(['request', 'compare']);
          setInternalArbiterMasterTone(internalArbiterRefs.master1, 'requesting');
          setInternalArbiterMasterStateText(internalArbiterRefs.master1State, 'REQ');
          setInternalArbiterLine(internalArbiterRefs.req1, 'is-req');
          setInternalArbiterLine(internalArbiterRefs.win, 'is-compare');
          setInternalArbiterTextColor(internalArbiterRefs.txtReq1, '#F59E0B');
          setInternalArbiterTextColor(internalArbiterRefs.txtWin, '#F59E0B');
          if (internalArbiterRefs.txtWin) {
            internalArbiterRefs.txtWin.textContent = 'M1 Win!';
          }
          activateInternalArbiterBox(internalArbiterRefs.priorityBox, 'is-priority');
          internalArbiterRefs.desc.className = 'arbiter-internal-desc is-request';
          internalArbiterRefs.desc.textContent = '[Step 3] Master 1의 HBUSREQ1이 들어오면 Priority Logic이 더 높은 우선순위를 감지해 winner를 M1로 갱신합니다.';
          break;
        case 4:
          syncInternalArbiterFlowStages(['grant', 'select']);
          setInternalArbiterMasterTone(internalArbiterRefs.master1, 'granted');
          setInternalArbiterMasterStateText(internalArbiterRefs.master1State, 'GNT');
          setInternalArbiterLine(internalArbiterRefs.gnt1, 'is-gnt');
          setInternalArbiterLine(internalArbiterRefs.hmaster, 'is-master');
          setInternalArbiterTextColor(internalArbiterRefs.txtGnt1, '#22C55E');
          setInternalArbiterTextColor(internalArbiterRefs.txtHmaster, '#3B82F6');
          activateInternalArbiterBox(internalArbiterRefs.ctrlBox, 'is-control');
          setInternalArbiterMuxPath(internalArbiterRefs.muxM1, true);
          internalArbiterRefs.mux?.classList.add('is-active');
          internalArbiterRefs.muxOut?.classList.add('is-active');
          internalArbiterRefs.desc.className = 'arbiter-internal-desc is-switch';
          internalArbiterRefs.desc.textContent = '[Step 4] HGRANT1과 HMASTER=1이 적용되면 MUX 선택이 바뀌고 버스 소유권이 Master 1로 넘어갑니다.';
          break;
        default:
          break;
      }

      syncInternalArbiterStepButtons(internalArbiterStateIndex);
      window.setTimeout(syncPageHeight, 40);
    }

    function startInternalArbiterAnimation() {
      if (!internalArbiterRefs.desc) return;
      const cadence = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 3600 : 2800;
      window.clearInterval(internalArbiterIntervalId);
      internalArbiterIntervalId = window.setInterval(() => {
        applyInternalArbiterAnimationStep(internalArbiterStateIndex + 1);
      }, cadence);
    }

    function initializeInternalArbiterAnimation(restart = false, initialStep = internalArbiterSelectedStepIndex) {
      if (!internalArbiterRefs.desc) return;
      if (internalArbiterInitialized && !restart) return;

      internalArbiterInitialized = true;
      window.clearInterval(internalArbiterIntervalId);
      internalArbiterSelectedStepIndex = ((Number(initialStep) || 0) % 5 + 5) % 5;
      internalArbiterStateIndex = internalArbiterSelectedStepIndex;
      applyInternalArbiterAnimationStep(internalArbiterSelectedStepIndex);
      startInternalArbiterAnimation();
    }

    let axiFullControlMathRendered = false;
    let cacheToggle = false;

    function renderAxiFullControlMath(force = false) {
      const root = document.querySelector('.axi-full-control-showcase');
      if (!root || typeof renderMathInElement !== 'function') return;
      if (axiFullControlMathRendered && !force) return;

      renderMathInElement(root, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
        ],
        throwOnError: false,
      });

      axiFullControlMathRendered = true;
      window.setTimeout(syncPageHeight, 40);
    }

    function showAxiFullControlMsg(id, text, duration = 2000, icon = '<i data-lucide="info" class="w-5 h-5 mb-1 opacity-70"></i>') {
      const msg = document.getElementById(id);
      if (!msg) return;

      msg.innerHTML = `${icon}<br>${text}`;
      lucide.createIcons({ root: msg });
      msg.style.opacity = 1;
      msg.style.transform = 'translate(-50%, -50%) scale(1.1)';

      window.setTimeout(() => {
        msg.style.opacity = 0;
        msg.style.transform = 'translate(-50%, -50%) scale(0.95)';
      }, duration);
    }

    const sleep = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));
    let lockAnimationRunning = false;

    async function runLock() {
      if (lockAnimationRunning) return;

      const plane = document.getElementById('plane-lock');
      const mon = document.getElementById('exclusive-monitor');
      const mTable = document.getElementById('mon-table');
      const mValid = document.getElementById('mon-valid');
      const mAddr = document.getElementById('mon-addr');
      const mId = document.getElementById('mon-id');
      const monitorState = document.getElementById('lock-monitor-state');
      const monitorDetail = document.getElementById('lock-monitor-detail');
      const runBtn = document.getElementById('lock-run-btn');
      const m0 = document.getElementById('lock-m0');
      const m1 = document.getElementById('lock-m1');

      if (!plane || !mon || !mTable || !mValid || !mAddr || !mId || !monitorState || !monitorDetail || !runBtn || !m0 || !m1) return;

      lockAnimationRunning = true;
      runBtn.disabled = true;
      runBtn.classList.add('opacity-60', 'cursor-not-allowed');

      const lockPacketThemes = {
        amber: {
          border: '#f59e0b',
          background: '#fffbeb',
          text: '#92400e',
          chipBg: 'rgba(245, 158, 11, 0.16)',
          chipColor: '#b45309',
        },
        slate: {
          border: '#64748b',
          background: '#f8fafc',
          text: '#334155',
          chipBg: 'rgba(100, 116, 139, 0.14)',
          chipColor: '#475569',
        },
        rose: {
          border: '#e11d48',
          background: '#fff1f2',
          text: '#be123c',
          chipBg: 'rgba(225, 29, 72, 0.12)',
          chipColor: '#be123c',
        },
      };

      function setChip(node, label, state) {
        node.textContent = label;
        node.className = 'axlock-monitor-chip';
        node.classList.add(`is-${state}`);
      }

      function clearMasterState() {
        [m0, m1].forEach((node) => node.classList.remove('axlock-master-active', 'axlock-master-interloper'));
      }

      function setActiveMaster(which) {
        clearMasterState();
        if (which === 'm0') m0.classList.add('axlock-master-active');
        if (which === 'm1') m1.classList.add('axlock-master-interloper');
      }

      function resetLockScene() {
        plane.innerHTML = '';
        clearMasterState();
        mon.classList.remove('error-shake', 'monitor-locked', 'monitor-invalidated');
        mValid.innerText = '0';
        mValid.className = 'p-1 border-r border-slate-200 transition-colors text-slate-400';
        mAddr.innerText = '-';
        mAddr.className = 'p-1 border-r border-slate-200 transition-colors text-slate-400';
        mId.innerText = '-';
        mId.className = 'p-1 transition-colors text-slate-400';
        mTable.className = 'text-[10px] mono font-bold text-slate-400 border border-slate-200 bg-white transition-colors duration-300';
        setChip(monitorState, 'Idle', 'idle');
        monitorDetail.textContent = '대기 중: exclusive read가 들어오면 여기에 읽기 예약이 생깁니다.';
      }

      function createPkt(horizontalClass, top, themeKey, channel, title, subtitle) {
        const theme = lockPacketThemes[themeKey];
        const p = document.createElement('div');
        p.className = 'packet axlock-packet absolute z-20';
        p.innerHTML = `<span class="axlock-packet__channel">${channel}</span><span class="axlock-packet__title">${title}</span><span class="axlock-packet__subtitle">${subtitle}</span>`;
        p.style.top = top;
        p.style.borderColor = theme.border;
        p.style.background = theme.background;
        p.style.color = theme.text;
        p.style.setProperty('--axlock-packet-chip-bg', theme.chipBg);
        p.style.setProperty('--axlock-packet-chip-color', theme.chipColor);
        if (horizontalClass.startsWith('left-[')) {
          p.style.left = horizontalClass.slice(6, -1);
        } else if (horizontalClass.startsWith('right-[')) {
          p.style.right = horizontalClass.slice(7, -1);
        }
        return p;
      }

      try {
        resetLockScene();

        setActiveMaster('m0');

        const ar = createPkt('left-[60px]', '100px', 'amber', 'AR', 'ARLOCK=1', 'Exclusive Read @ 0x100');
        plane.appendChild(ar);

        await sleep(100);
        ar.style.top = '220px';
        ar.style.left = '50%';
        ar.style.transform = 'translateX(-50%)';

        await sleep(650);
        ar.style.opacity = 0;

        mon.classList.add('monitor-locked');
        mValid.innerText = '1';
        mValid.className = 'p-1 border-r border-slate-200 transition-colors text-emerald-600';
        mAddr.innerText = '0x100';
        mAddr.className = 'p-1 border-r border-slate-200 transition-colors text-amber-700';
        mId.innerText = 'M0';
        mId.className = 'p-1 transition-colors text-amber-700';
        mTable.className = 'text-[10px] mono font-bold text-slate-400 border border-amber-400 bg-amber-50 transition-colors duration-300';
        setChip(monitorState, 'Reservation Active', 'active');
        monitorDetail.textContent = 'M0의 exclusive read가 0x100에 대한 읽기 예약을 만들었습니다.';

        showAxiFullControlMsg('lock-msg', 'M0 Exclusive Read Accepted<br>Read Reservation Created', 1600, '<i data-lucide="lock" class="w-5 h-5 mb-1 text-amber-300"></i>');
        await sleep(1600);

        setActiveMaster('m1');

        const nW = createPkt('right-[60px]', '100px', 'slate', 'AW', 'AWLOCK=0', 'Normal Write @ 0x100');
        plane.appendChild(nW);

        await sleep(100);
        nW.style.top = '220px';
        nW.style.left = '50%';
        nW.style.right = 'auto';
        nW.style.transform = 'translateX(-50%)';

        await sleep(650);
        nW.style.opacity = 0;

        mon.classList.remove('monitor-locked');
        mon.classList.add('monitor-invalidated', 'error-shake');
        mValid.innerText = '0';
        mValid.className = 'p-1 border-r border-slate-200 transition-colors text-rose-600';
        mAddr.className = 'p-1 border-r border-slate-200 transition-colors text-slate-500';
        mId.className = 'p-1 transition-colors text-slate-500';
        mTable.className = 'text-[10px] mono font-bold text-slate-400 border border-rose-400 bg-rose-50 transition-colors duration-300';
        setChip(monitorState, 'Reservation Invalidated', 'invalid');
        monitorDetail.textContent = '다른 master의 normal write가 같은 주소를 갱신해 읽기 예약이 삭제되었습니다.';

        showAxiFullControlMsg('lock-msg', 'M1 Normal Write Committed<br>Read Reservation Cleared', 2100, '<i data-lucide="shield-alert" class="w-5 h-5 mb-1 text-rose-300"></i>');
        await sleep(2100);

        setActiveMaster('m0');

        const aw = createPkt('left-[60px]', '100px', 'amber', 'AW', 'AWLOCK=1', 'Exclusive Write @ 0x100');
        plane.appendChild(aw);

        await sleep(100);
        aw.style.top = '220px';
        aw.style.left = '50%';
        aw.style.transform = 'translateX(-50%)';

        await sleep(650);
        aw.style.opacity = 0;

        const resp = createPkt('left-[50%]', '220px', 'rose', 'B', 'BRESP=OKAY', 'Exclusive Fail / No Update');
        plane.appendChild(resp);
        resp.style.left = '50%';
        resp.style.transform = 'translateX(-50%)';

        await sleep(100);
        resp.style.top = '100px';
        resp.style.left = '60px';
        resp.style.transform = 'none';

        setChip(monitorState, 'Retry Required', 'invalid');
        monitorDetail.textContent = '읽기에서 만든 예약이 이미 사라져서 M0는 read부터 다시 시작해야 하며, 이번 write는 메모리를 갱신하지 못합니다.';

        showAxiFullControlMsg('lock-msg', 'BRESP=OKAY<br>Read Reservation Missing, Retry from Read', 2600, '<i data-lucide="x-circle" class="w-5 h-5 mb-1 text-rose-300"></i>');

        await sleep(2600);
        resp.style.opacity = 0;
      } finally {
        runBtn.disabled = false;
        runBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        lockAnimationRunning = false;
      }
    }

    async function runProt() {
      const plane = document.getElementById('plane-prot');
      const tzcBlock = document.getElementById('tzc-block');
      const rowSec = document.getElementById('tz-row-sec');
      const rowNsec = document.getElementById('tz-row-nsec');
      const evalBox = document.getElementById('tz-eval-box');

      if (!plane || !tzcBlock || !rowSec || !rowNsec || !evalBox) return;

      plane.innerHTML = '';
      tzcBlock.classList.remove('firewall-active', 'error-shake');
      rowSec.classList.remove('tz-row-active');
      rowNsec.classList.remove('tz-row-active');
      evalBox.innerText = 'Waiting for Req...';
      evalBox.className = 'font-bold text-slate-700';

      function createProtPkt(horizontalClass, top, color, protBits, addrHex, isSecure) {
        const p = document.createElement('div');
        p.className = `packet absolute w-24 h-8 border-2 border-${color}-500 bg-${color}-50 text-${color}-800 flex flex-col items-center justify-center text-[8px] font-black rounded shadow-md z-20`;
        p.innerHTML = `<span class="tracking-tight">PROT:${protBits} (${isSecure ? 'S' : 'NS'})</span><span class="font-normal tracking-tight font-mono">ADDR:${addrHex}</span>`;
        p.style.top = top;
        if (horizontalClass.startsWith('left-[')) {
          p.style.left = horizontalClass.slice(6, -1);
        } else if (horizontalClass.startsWith('right-[')) {
          p.style.right = horizontalClass.slice(7, -1);
        }
        return p;
      }

      const req1 = createProtPkt('right-[60px]', '100px', 'slate', '010', '0x120', false);
      plane.appendChild(req1);

      await sleep(100);
      req1.style.top = '180px';
      req1.style.left = '50%';
      req1.style.right = 'auto';
      req1.style.transform = 'translateX(-50%)';

      await sleep(600);
      rowNsec.classList.add('tz-row-active');
      evalBox.innerHTML = '<span class="text-emerald-600">ADDR(0x120) in NS Region<br>-> Access Granted</span>';
      evalBox.className = 'font-bold text-emerald-700';
      showAxiFullControlMsg('prot-msg', 'Scenario 1: Normal Access OK', 1200, '<i data-lucide="check-circle" class="w-5 h-5 mb-1 text-emerald-300"></i>');

      await sleep(1000);
      req1.style.top = '300px';
      req1.style.left = 'calc(100% - 80px)';
      req1.style.transform = 'none';

      await sleep(600);
      req1.style.opacity = 0;
      rowNsec.classList.remove('tz-row-active');
      evalBox.innerText = 'Waiting for Req...';

      await sleep(100);

    async function runCache() {
      const plane = document.getElementById('plane-cache');
      const cacheBlock = document.getElementById('cache-block');
      const cacheFill = document.getElementById('cache-dirty-fill');
      const cacheText = document.getElementById('cache-inner-text');
      const masterStatus = document.getElementById('master-cache-status');
      const ddrBlock = document.getElementById('ddr-block');
      const ddrStatus = document.getElementById('ddr-status');

      if (!plane || !cacheBlock || !cacheFill || !cacheText || !masterStatus || !ddrBlock || !ddrStatus) return;

      plane.innerHTML = '';
      cacheBlock.classList.remove('cache-dirty');
      cacheFill.style.width = '0%';
      cacheText.innerText = 'Line Empty';
      cacheText.classList.remove('text-blue-700');
      cacheText.classList.add('text-slate-400');
      masterStatus.innerText = 'WAITING';
      masterStatus.className = 'mt-0.5 text-[8px] font-bold px-2 py-0.5 rounded bg-slate-100 text-slate-400';
      ddrBlock.classList.remove('ddr-writing');
      ddrStatus.innerText = 'IDLE';

      cacheToggle = !cacheToggle;
      const isCacheable = cacheToggle;

      function createPkt(text, color, top, left) {
        const p = document.createElement('div');
        p.className = `packet absolute w-24 h-6 border-2 flex items-center justify-center text-[8px] font-black rounded shadow-md z-30 ${color}`;
        p.innerText = text;
        p.style.top = top;
        p.style.left = left;
        plane.appendChild(p);
        return p;
      }

      const req = createPkt(
        isCacheable ? 'WRITE (BUFFERABLE)' : 'WRITE (DEVICE)',
        isCacheable ? 'border-blue-500 bg-blue-100 text-blue-800' : 'border-slate-500 bg-slate-100 text-slate-800',
        '70px',
        '50%'
      );
      req.style.transform = 'translateX(-50%)';

      await sleep(100);
      masterStatus.innerText = 'STALLED (WAITING RESP)';
      masterStatus.classList.replace('bg-slate-100', 'bg-rose-100');
      masterStatus.classList.replace('text-slate-400', 'text-rose-600');

      if (isCacheable) {
        req.style.top = '180px';
        req.style.left = '25%';

        await sleep(600);
        req.style.opacity = 0;

        cacheBlock.classList.add('cache-dirty');
        cacheFill.style.width = '100%';
        cacheText.innerText = 'Dirty Data';
        cacheText.classList.replace('text-slate-400', 'text-blue-700');

        const earlyResp = createPkt('BVALID (Early)', 'border-emerald-500 bg-emerald-100 text-emerald-800', '180px', '25%');
        earlyResp.style.transform = 'translateX(-50%)';

        await sleep(100);
        earlyResp.style.top = '70px';
        earlyResp.style.left = '50%';

        showAxiFullControlMsg('cache-msg', 'Early Response (BVALID)!<br>Master is now free.', 2000, '<i data-lucide="zap" class="w-5 h-5 mb-1 text-emerald-300"></i>');

        await sleep(600);
        earlyResp.style.opacity = 0;

        masterStatus.innerText = 'FREE / NEXT OP';
        masterStatus.classList.replace('bg-rose-100', 'bg-emerald-100');
        masterStatus.classList.replace('text-rose-600', 'text-emerald-700');

        await sleep(1000);

        showAxiFullControlMsg('cache-msg', 'Background Eviction<br>Cache Line Flush to DDR', 2500, '<i data-lucide="download" class="w-5 h-5 mb-1 text-blue-300"></i>');

        const evictReq = createPkt('EVICT TO DDR', 'border-slate-400 bg-slate-100 text-slate-600 border-dashed', '220px', '25%');
        evictReq.style.transform = 'translateX(-50%) scale(0.9)';

        await sleep(100);
        evictReq.style.top = '300px';

        await sleep(600);
        evictReq.style.opacity = 0;

        ddrBlock.classList.add('ddr-writing');
        ddrStatus.innerText = 'WRITING...';

        await sleep(800);
        ddrBlock.classList.remove('ddr-writing');
        ddrStatus.innerText = 'IDLE';

        cacheBlock.classList.remove('cache-dirty');
        cacheFill.style.width = '0%';
        cacheText.innerText = 'Line Empty';
        cacheText.classList.replace('text-blue-700', 'text-slate-400');
      } else {
        req.style.top = '120px';
        req.style.left = '75%';

        await sleep(300);
        req.style.top = '300px';

        await sleep(500);
        req.style.opacity = 0;

        ddrBlock.classList.add('ddr-writing');
        ddrStatus.innerText = 'WRITING...';
        showAxiFullControlMsg('cache-msg', 'Direct Memory Write.<br>Master is blocked.', 2000, '<i data-lucide="clock" class="w-5 h-5 mb-1 text-slate-300"></i>');

        await sleep(1500);

        ddrBlock.classList.remove('ddr-writing');
        ddrStatus.innerText = 'DONE';

        const lateResp = createPkt('BVALID (Late)', 'border-emerald-500 bg-emerald-100 text-emerald-800', '300px', '75%');
        lateResp.style.transform = 'translateX(-50%)';

        await sleep(100);
        lateResp.style.top = '70px';
        lateResp.style.left = '50%';

        await sleep(600);
        lateResp.style.opacity = 0;

        masterStatus.innerText = 'FREE / NEXT OP';
        masterStatus.classList.replace('bg-rose-100', 'bg-emerald-100');
        masterStatus.classList.replace('text-rose-600', 'text-emerald-700');
      }
    }

    async function runQos() {
      const plane = document.getElementById('plane-qos');
      const arbiterStatus = document.getElementById('arbiter-status');
      const arbiterBox = document.getElementById('qos-arbiter');
      if (!plane || !arbiterStatus || !arbiterBox) return;

      plane.innerHTML = '';
      arbiterStatus.innerText = 'Waiting...';
      arbiterStatus.className = 'mt-3 px-3 py-1 bg-slate-100 rounded text-[9px] font-black text-slate-500 uppercase tracking-widest border border-slate-200';
      arbiterBox.classList.remove('arbiter-active');

      function createQosPacket(id, qos, isHigh, startTop) {
        const color = isHigh ? 'emerald' : 'slate';
        const pkt = document.createElement('div');
        pkt.className = `packet absolute w-[50px] h-9 border-2 border-${color}-500 bg-${color}-50 text-${color}-800 flex flex-col items-center justify-center rounded shadow-sm`;
        pkt.style.left = '120px';
        pkt.style.top = `${startTop}px`;
        pkt.innerHTML = `<span class="text-[9px] font-black leading-tight">QoS:${qos}</span><span class="text-[7px] leading-tight">ID:${id}</span>`;
        plane.appendChild(pkt);
        return pkt;
      }

      const dma1 = createQosPacket('D1', '0', false, 256);
      const dma2 = createQosPacket('D2', '0', false, 256);
      const dma3 = createQosPacket('D3', '0', false, 256);
      const disp = createQosPacket('LCD', 'F', true, 74);

      window.setTimeout(() => {
        dma1.style.left = 'calc(50% - 25px)';
        dma1.style.top = '172px';
      }, 100);

      await sleep(600);
      arbiterStatus.innerText = 'Routing D1 (0x0)';
      dma1.style.left = 'calc(100% - 90px)';

      window.setTimeout(() => {
        dma2.style.left = 'calc(50% - 25px)';
        dma2.style.top = '172px';
      }, 100);
      window.setTimeout(() => {
        disp.style.left = 'calc(50% - 25px)';
        disp.style.top = '172px';
      }, 200);

      await sleep(600);
      dma1.style.opacity = 0;

      arbiterStatus.innerText = 'Contention! F > 0';
      arbiterStatus.classList.replace('bg-slate-100', 'bg-emerald-100');
      arbiterStatus.classList.replace('text-slate-500', 'text-emerald-700');
      arbiterBox.classList.add('arbiter-active');
      showAxiFullControlMsg('qos-msg', 'Priority Hint Applied<br>QoS:F selected before QoS:0', 2000, '<i data-lucide="arrow-up-circle" class="w-5 h-5 mb-1 text-emerald-300"></i>');

      await sleep(800);
      arbiterStatus.innerText = 'Routing LCD (0xF)';
      disp.style.left = 'calc(100% - 90px)';

      window.setTimeout(() => {
        dma3.style.left = 'calc(50% - 25px)';
        dma3.style.top = '172px';
      }, 100);

      await sleep(600);
      disp.style.opacity = 0;

      arbiterStatus.innerText = 'Routing D2 (0x0)';
      arbiterStatus.classList.replace('bg-emerald-100', 'bg-slate-100');
      arbiterStatus.classList.replace('text-emerald-700', 'text-slate-500');
      arbiterBox.classList.remove('arbiter-active');

      dma2.style.left = 'calc(100% - 90px)';

      await sleep(600);
      dma2.style.opacity = 0;
      arbiterStatus.innerText = 'Routing D3 (0x0)';
      dma3.style.left = 'calc(100% - 90px)';

      await sleep(600);
      dma3.style.opacity = 0;
      arbiterStatus.innerText = 'Waiting...';
    }

    let outstandingRunToken = 0;

    async function runOutstanding() {
      const runToken = ++outstandingRunToken;
      const plane = document.getElementById('plane-out');
      const queue = document.getElementById('out-queue');
      const utilVal = document.getElementById('util-val');
      const depthVal = document.getElementById('depth-val');
      const status = document.getElementById('out-status');
      const phaseVal = document.getElementById('out-phase-val');
      const phaseKicker = document.getElementById('out-phase-kicker');
      const story = document.getElementById('out-story');
      const pipelinePill = document.getElementById('out-pipeline-pill');
      const issuedCount = document.getElementById('out-issued-count');
      const completeCount = document.getElementById('out-complete-count');
      const depthTrack = document.getElementById('out-depth-track');
      const addrLane = document.getElementById('out-addr-lane');
      const respLane = document.getElementById('out-resp-lane');
      const masterNode = document.getElementById('out-master-node');
      const slaveNode = document.getElementById('out-slave-node');

      if (
        !plane || !queue || !utilVal || !depthVal || !status
        || !phaseVal || !phaseKicker || !story || !pipelinePill
        || !issuedCount || !completeCount || !depthTrack
        || !addrLane || !respLane || !masterNode || !slaveNode
      ) return;

      plane.innerHTML = '';
      queue.innerHTML = '';

      const count = 4;
      let currentDepth = 0;
      let issued = 0;
      let retired = 0;
      let queueItemHeight = 34;

      const wait = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));
      const isCurrentRun = () => runToken === outstandingRunToken;

      function setLaneState({ address = false, response = false } = {}) {
        addrLane.classList.toggle('is-address-active', address);
        respLane.classList.toggle('is-response-active', response);
      }

      function renderDepthTrack() {
        depthTrack.innerHTML = Array.from({ length: count }, (_, index) => {
          const stateClass = index < currentDepth ? 'is-filled' : '';
          const hotClass = index === currentDepth - 1 ? 'is-hot' : '';
          return `<span class="outstanding-depth-slot ${stateClass} ${hotClass}"></span>`;
        }).join('');
      }

      function calculateQueueItemHeight() {
        const queueStyles = window.getComputedStyle(queue);
        const paddingY = parseFloat(queueStyles.paddingTop || '0') + parseFloat(queueStyles.paddingBottom || '0');
        const gap = parseFloat(queueStyles.rowGap || queueStyles.gap || '0');
        const availableHeight = Math.max(queue.clientHeight - paddingY, 0);
        const fittedHeight = Math.floor((availableHeight - gap * (count - 1)) / count);
        return Math.max(26, fittedHeight);
      }

      function syncMetrics() {
        utilVal.innerText = `${Math.round((currentDepth / count) * 100)}%`;
        depthVal.innerText = `${currentDepth}/${count}`;
        issuedCount.innerText = String(issued);
        completeCount.innerText = String(retired);
        pipelinePill.innerHTML = `<span aria-hidden="true">📦</span><span>주소 선발행 ${currentDepth}개</span>`;
        renderDepthTrack();
      }

      function setNarrative({ phase, kicker, message, address = false, response = false }) {
        phaseVal.innerText = phase;
        phaseKicker.innerText = kicker;
        story.innerHTML = message;
        setLaneState({ address, response });
      }

      function getOutstandingPacketGeometry() {
        const planeRect = plane.getBoundingClientRect();
        const masterRect = masterNode.getBoundingClientRect();
        const slaveRect = slaveNode.getBoundingClientRect();
        const packetWidth = 80;

        return {
          issueX: plane.clientWidth / 3 - packetWidth / 2,
          responseX: plane.clientWidth * (2 / 3) - packetWidth / 2,
          masterLaunchY: masterRect.bottom - planeRect.top + 10,
          queueCaptureY: slaveRect.top - planeRect.top + slaveRect.height / 2 - 16,
          responseLaunchY: slaveRect.top - planeRect.top + slaveRect.height / 2 - 16,
          masterReceiveY: masterRect.bottom - planeRect.top - 30,
        };
      }

      syncMetrics();
      status.innerText = 'IDLE';
      setNarrative({
        phase: '준비',
        kicker: '🧩 준비',
        message: '🧩 준비 상태 · 선발행 대기',
      });

      await wait(90);
      if (!isCurrentRun()) return;

      const geometry = getOutstandingPacketGeometry();
      queueItemHeight = calculateQueueItemHeight();

      setNarrative({
        phase: '선발행',
        kicker: '🚀 선발행',
        message: '🚀 주소 선발행 · Queue 적재',
        address: true,
      });

      for (let i = 0; i < count; i += 1) {
        await wait(400);
        if (!isCurrentRun()) return;

        const ar = document.createElement('div');
        ar.className = 'packet absolute w-20 h-8 border-2 border-blue-600 bg-white flex flex-col items-center justify-center shadow-lg rounded';
        ar.innerHTML = `<span class="text-[7px] font-black text-blue-400">ARID:${i}</span><span class="text-[9px] font-bold">ADDR</span>`;
        ar.style.left = `${geometry.issueX}px`;
        ar.style.top = `${geometry.masterLaunchY}px`;
        plane.appendChild(ar);
        status.innerText = `ISSUING ARID:${i}`;
        story.innerHTML = `🚀 <strong>ARID:${i}</strong> 선발행 · Queue 적재 대기`;

        await wait(30);
        if (!isCurrentRun()) return;

        ar.style.top = `${geometry.queueCaptureY}px`;
        ar.style.opacity = '0';

        await wait(560);
        if (!isCurrentRun()) return;

        issued += 1;
        currentDepth += 1;
        syncMetrics();

        const qItem = document.createElement('div');
        qItem.className = 'w-full rounded-xl border border-blue-400 bg-gradient-to-r from-blue-600 to-blue-500 px-3 text-[10px] font-bold text-white mono shadow-inner flex items-center justify-between';
        qItem.style.height = `${queueItemHeight}px`;
        qItem.style.minHeight = `${queueItemHeight}px`;
        qItem.innerHTML = `<span>ID:${i}</span><span>QUEUED</span>`;
        queue.appendChild(qItem);
      }

      if (!isCurrentRun()) return;

      status.innerText = 'OUTSTANDING FULL';
      setNarrative({
        phase: '포화',
        kicker: '🧱 포화',
        message: `🧱 Outstanding <strong>${count}건</strong> · Latency 은닉`,
        address: true,
      });

      await wait(1100);
      if (!isCurrentRun()) return;

      setNarrative({
        phase: '회수',
        kicker: '📬 회수',
        message: '📬 RID 회수 · Depth 축소',
        response: true,
      });

      for (let i = 0; i < count; i += 1) {
        await wait(680);
        if (!isCurrentRun()) return;

        const retiringItem = queue.firstChild;
        if (retiringItem) {
          retiringItem.style.opacity = '0.45';
          retiringItem.style.transform = 'translateX(6px)';
          await wait(90);
          if (!isCurrentRun()) return;
          if (retiringItem.parentNode === queue) queue.removeChild(retiringItem);
        }

        currentDepth -= 1;
        retired += 1;
        syncMetrics();
        status.innerText = `RECEIVING RID:${i}`;
        story.innerHTML = `📬 <strong>RID:${i}</strong> 회수 · 잔여 <strong>${currentDepth}건</strong>`;

        const r = document.createElement('div');
        r.className = 'packet absolute w-20 h-8 border-2 border-emerald-600 bg-emerald-50 flex flex-col items-center justify-center shadow-lg rounded';
        r.innerHTML = `<span class="text-[7px] font-black text-emerald-400">RID:${i}</span><span class="text-[9px] font-bold">DATA</span>`;
        r.style.left = `${geometry.responseX}px`;
        r.style.top = `${geometry.responseLaunchY}px`;
        plane.appendChild(r);

        await wait(30);
        if (!isCurrentRun()) return;

        r.style.top = `${geometry.masterReceiveY}px`;
        r.style.opacity = '0';
      }

      if (!isCurrentRun()) return;

      setNarrative({
        phase: '완료',
        kicker: '✅ 완료',
        message: '📦 선발행 · ⏱️ 은닉 · 📬 회수 완료',
      });
      status.innerText = 'IDLE';
    }

      ) return;

      const issueOrder = [0, 1];

      function renderIssueOrder(activeId = null) {
